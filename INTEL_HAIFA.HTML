<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="robots" content="noindex, nofollow">
    
    <title>מערכת QC אינטל חיפה - הגרסה המלאה</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root { 
            --intel-blue: #0071c5; --intel-dark: #003c71; --intel-light: #f0f7ff;
            --success: #27ae60; --warning: #f39c12; --danger: #e74c3c; 
            --na: #95a5a6; --bg: #f4f7f9; --text: #2c3e50;
            --radius-lg: 25px; --radius-md: 15px; --shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            background: var(--bg); margin: 0; padding: 0; color: var(--text);
            direction: rtl; overflow-x: hidden; -webkit-font-smoothing: antialiased;
        }

        /* אנימציות */
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .page { display: none; min-height: 100vh; animation: slideUp 0.4s ease-out; }
        .active-page { display: block; }

        /* מסך כניסה */
        #login_page { 
            background: radial-gradient(circle at center, var(--intel-blue) 0%, var(--intel-dark) 100%);
            display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .login-card {
            background: white; padding: 50px; border-radius: var(--radius-lg);
            box-shadow: 0 30px 80px rgba(0,0,0,0.4); width: 100%; max-width: 450px; text-align: center;
        }
        .security-tag {
            background: var(--intel-light); color: var(--intel-blue); padding: 10px 20px;
            border-radius: 50px; font-size: 13px; font-weight: 700; margin-bottom: 30px;
            display: inline-block; border: 1px solid #d0e7ff;
        }

        /* תפריט ראשי */
        #menu_page { padding: 40px 20px; text-align: center; }
        .stats-grid {
            display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px;
            max-width: 600px; margin: 30px auto;
        }
        .stat-card { background: white; padding: 20px; border-radius: var(--radius-md); box-shadow: var(--shadow); }
        .stat-num { font-size: 24px; font-weight: 900; color: var(--intel-blue); display: block; }

        /* דאשבורד (שעונים) */
        .dashboard { 
            position: sticky; top: 0; z-index: 2000; background: rgba(255,255,255,0.95); 
            backdrop-filter: blur(15px); padding: 15px 20px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); 
            display: flex; justify-content: space-around; align-items: center; border-bottom: 5px solid var(--intel-blue);
        }
        .gauge-circle { 
            width: 85px; height: 85px; border-radius: 50%; border: 7px solid #f0f2f5;
            margin: auto; display: flex; align-items: center; justify-content: center;
            font-size: 22px; font-weight: 900; background: white;
        }
        .trend-icon { font-size: 24px; position: absolute; top: -5px; right: 15%; }

        /* טופס ביקורת */
        .container { padding: 25px; max-width: 900px; margin: auto; padding-bottom: 120px; }
        .card { background: white; padding: 30px; border-radius: var(--radius-lg); margin-bottom: 30px; box-shadow: var(--shadow); }
        .category-header {
            background: linear-gradient(135deg, var(--intel-blue) 0%, #005696 100%); 
            color: white; padding: 18px 25px; border-radius: var(--radius-md); 
            font-weight: 800; font-size: 19px; margin: 45px 0 25px;
        }
        .audit-row {
            background: white; padding: 25px; border-radius: 20px;
            margin-bottom: 20px; border-right: 12px solid #edf2f7;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02); transition: 0.3s;
        }
        .audit-row.active { border-right-color: var(--intel-blue); }

        /* כפתורי ציון */
        .score-flex { display: flex; gap: 15px; margin-top: 15px; }
        .btn-score {
            flex: 1; padding: 18px 5px; border: 2.5px solid #f1f3f5;
            background: #f8fafc; border-radius: var(--radius-md); font-weight: 800; font-size: 16px; cursor: pointer;
        }
        .btn-pass.active { background: var(--success); color: white; border-color: var(--success); }
        .btn-fail.active { background: var(--danger); color: white; border-color: var(--danger); }
        .btn-na.active { background: var(--na); color: white; border-color: var(--na); }

        .note-area {
            width: 100%; margin-top: 15px; padding: 15px; border: 2px dashed #cbd5e0;
            border-radius: var(--radius-md); font-size: 15px; display: none; outline: none; box-sizing: border-box;
        }

        /* היסטוריה */
        .history-item {
            background: white; padding: 25px; border-radius: 20px; margin-bottom: 20px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: var(--shadow); border-right: 8px solid var(--intel-blue);
        }

        /* PDF וייצוא (Virtual Desktop Viewport) */
        #pdf_export_zone { 
            position: absolute; left: -15000px; top: 0; width: 1250px; 
            background: white; padding: 70px; direction: rtl;
        }
        .pdf-table { width: 100%; border-collapse: collapse; margin-top: 35px; }
        .pdf-table th, .pdf-table td { border: 2px solid #eee; padding: 18px; text-align: right; }
        .pdf-cat-row { background: #eef6fc; font-weight: 900; color: var(--intel-dark); font-size: 18px; }

        /* מודל */
        #modal_pdf {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 5000; padding: 20px; backdrop-filter: blur(10px);
        }
        .modal-body {
            background: white; padding: 50px; border-radius: 35px; max-width: 550px; margin: 50px auto; text-align: center;
        }
        
        /* כפתורים כלליים */
        .btn-main {
            width: 100%; padding: 20px; border: none; border-radius: var(--radius-md);
            font-size: 19px; font-weight: 800; cursor: pointer; transition: 0.3s;
            background: var(--intel-blue); color: white; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
    </style>
</head>
<body>

<div id="login_page" class="page active-page">
    <div class="login-card">
        <h1>Intel Haifa QC</h1>
        <p>מערכת ניהול בקרת איכות - ניר עציון</p>
        <div class="security-tag">🔐 סביבה פרטית ומאובטחת</div>
        <input type="password" id="login_pass" style="width:100%; padding:20px; border-radius:15px; border:2px solid #eee; font-size:22px; text-align:center; margin-bottom:25px;" placeholder="קוד גישה (2024)">
        <button class="btn-main" onclick="checkLogin()">כניסה למערכת</button>
    </div>
</div>

<div id="menu_page" class="page">
    <div class="container" style="text-align:center;">
        <h2 style="font-size:36px; color:var(--intel-blue);">שלום שמעון,</h2>
        <div class="stats-grid">
            <div class="stat-card"><span id="stat_count" class="stat-num">0</span><span>ביקורות</span></div>
            <div class="stat-card"><span id="stat_avg" class="stat-num">0%</span><span>ממוצע</span></div>
            <div class="stat-card"><span id="stat_last" class="stat-num">--</span><span>אחרונה</span></div>
        </div>
        <div style="display:grid; gap:20px; max-width:550px; margin:40px auto;">
            <button class="btn-main" onclick="showPage('audit_page')">➕ ביקורת איכות חדשה</button>
            <button class="btn-main" style="background:white; color:var(--intel-blue); border:3px solid var(--intel-blue);" onclick="openHistory()">📂 היסטוריית דוחות</button>
            <button class="btn-main" style="background:#edf2f7; color:#4a5568;" onclick="location.reload()">🔒 התנתקות</button>
        </div>
    </div>
</div>

<div id="audit_page" class="page">
    <div class="dashboard">
        <div style="text-align:center;">
            <div style="font-size:11px; font-weight:800; color:#7f8c8d;">ציון נוכחי</div>
            <div id="gauge_live" class="gauge-circle" style="color:var(--intel-blue);">0%</div>
        </div>
        <div style="text-align:center; position:relative;">
            <div id="trend_icon" class="trend-icon"></div>
            <div style="font-size:11px; font-weight:800; color:#7f8c8d;">ביקורת קודמת</div>
            <div id="gauge_prev" class="gauge-circle" style="font-size:16px; color:#bdc3c7; border-style:dashed;">--</div>
        </div>
        <button onclick="showPage('menu_page')" style="background:none; border:none; font-size:32px; cursor:pointer;">🏠</button>
    </div>

    <div class="container">
        <div class="card">
            <label style="font-weight:800; color:var(--intel-blue);">שם המבקר/ת:</label>
            <input type="text" id="inspector_name" style="margin-top:10px; width:100%;" placeholder="הכנס שם מלא">
            <label style="font-weight:800; color:var(--intel-blue); display:block; margin-top:25px;">בחר מתחם בדיקה:</label>
            <select id="form_select" onchange="initForm()" style="margin-top:10px; width:100%; border:3px solid var(--intel-blue); font-weight:900;">
                <option value="">-- בחר טופס מהרשימה --</option>
                <optgroup label="🍴 Nine Dine">
                    <option value="nd_clean">סיור ניקיון - Nine Dine</option>
                    <option value="nd_food">בטיחות מזון - Nine Dine</option>
                </optgroup>
                <optgroup label="🍱 Bento & Nona">
                    <option value="bento">ביקורת Bento (מקיף)</option>
                    <option value="nona">ביקורת Nona (מקיף)</option>
                </optgroup>
                <optgroup label="☕ בתי קפה">
                    <option value="cafe">סיור בתי קפה (אילנ'ס)</option>
                </optgroup>
                <optgroup label="📦 לוגיסטיקה">
                    <option value="marlog">פגי תוקף וניקיון - מרלו"ג</option>
                </optgroup>
            </select>
        </div>
        <div id="form_mount"></div>
        <div id="footer_zone" class="card" style="display:none;">
            <label style="font-weight:800; color:var(--intel-blue);">סיכום מנהלים:</label>
            <textarea id="audit_summary" rows="6" style="margin-top:10px; width:100%;" placeholder="תאר כאן ממצאים ודגשים לשיפור..."></textarea>
            <button class="btn-main" style="margin-top:30px;" onclick="saveAudit()">💾 סיים ושמור PDF</button>
        </div>
    </div>
</div>

<div id="history_page" class="page">
    <div class="container">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:40px;">
            <h2 style="font-size:32px; color:var(--intel-blue); margin:0;">היסטוריית ביקורות</h2>
            <button class="btn-main" style="width:auto; padding:12px 25px;" onclick="showPage('menu_page')">חזור</button>
        </div>
        <div id="history_list"></div>
    </div>
</div>

<div id="modal_pdf">
    <div class="modal-body">
        <div style="font-size:70px;">📄</div>
        <h2 style="color:var(--intel-blue);">הדוח נשמר בהצלחה!</h2>
        <p style="color:#7f8c8d;">כעת ניתן להפיק את קובץ ה-PDF המקצועי ולשתף אותו.</p>
        <button class="btn-main" onclick="exportPDF()">📤 שלח PDF עכשיו (WhatsApp)</button>
        <button class="btn-main" style="background:#f1f3f5; color:#444; margin-top:15px;" onclick="document.getElementById('modal_pdf').style.display='none'">חזור</button>
    </div>
</div>

<div id="pdf_export_zone"></div>

<script>
    // --- מסד הנתונים המלא (כל השאלות מכל הגיליונות) ---
    const MASTER_DB = {
        "nd_clean": {
            name: "סיור ניקיון - Nine Dine",
            data: [
                { cat: "רחבת כניסה", qs: ["קופות נקיות", "עמדת סכו\"ם נקייה ומלאה", "עמדת שטיפת ידיים - סבון ונייר", "רצפה נקייה בכל שטח הכניסה", "שילוט תפריטים נקי ומעודכן"] },
                { cat: "עמדות הגשה", qs: ["פלנצ'ות ומשטחי עבודה מבריקים", "מנדפים נקיים ללא שומן", "דלפקי הגשה נקיים משאריות", "פסי הגשה (חם/קר) נקיים", "זכוכיות הגשה ללא סימנים"] },
                { cat: "חדר אוכל", qs: ["שולחנות וכסאות נקיים", "עמדות פינוי כלים (טרולי) נקיות", "מכונות שתייה וקפה נקיות", "רצפת חדר האוכל נקייה"] },
                { cat: "פגי תוקף ותיעוד", qs: ["בדיקת תאריכים על רטבים בעמדות", "תיעוד ניקיונות יומי חתום", "בדיקת תוקף מוצרי TA (To-Go)"] }
            ]
        },
        "nd_food": {
            name: "בטיחות מזון - Nine Dine",
            data: [
                { cat: "קירור והקפאה", qs: ["הפרדה מלאה בין גולמי למבושל", "כל המזון מכוסה ועטוף", "מדבקות תאריך פתיחה/תוקף על הכל", "אחסון ביצים במקרר ייעודי", "טמפרטורה תקינה במקררים"] },
                { cat: "תהליכי ייצור", qs: ["שימוש בקרשי חיתוך לפי קוד צבעים", "מניעת זיהום צולב בעבודה", "לבוש מגן: כפפות, כיסוי ראש, סינר", "תיעוד בישול תרמי וחיטוי ירקות"] },
                { cat: "פגי תוקף", qs: ["בדיקת תוקף חומרי גלם במקררי עבודה", "בדיקת תוקף רטבים וצמצומים", "בדיקת תוקף סלטים בהכנה עצמית"] }
            ]
        },
        "bento": {
            name: "ביקורת Bento",
            data: [
                { cat: "ניקיון וסדר", qs: ["דלפקים נקיים", "עמדת החומוס נקייה", "מקררי TA מסודרים", "סביבת עבודה אחורית נקייה"] },
                { cat: "בטיחות ופגי תוקף", qs: ["בדיקת תוקף רטבים (טריאקי, סויה וכו')", "בדיקת תוקף אורז וסושי בתיעוד", "סימון תוקף על סלטים", "הפרדה במקררים"] }
            ]
        },
        "nona": {
            name: "ביקורת Nona",
            data: [
                { cat: "ניקיון וסדר", qs: ["דלפקי הגשה נקיים", "מכשור (גריל, טוסטר) נקי", "רצפה ופחי אשפה נקיים", "סידור רטבים ותוספות"] },
                { cat: "בטיחות ופגי תוקף", qs: ["בדיקת תוקף גבינות ומוצרי חלב", "בדיקת תוקף ירקות חתוכים", "סימון תאריכי פתיחה על רטבים", "טמפרטורת מקררי פס"] }
            ]
        },
        "cafe": {
            name: "סיור בתי קפה",
            data: [
                { cat: "ניקיון ושירות", qs: ["מכונות קפה וטוחנים נקיים", "מקרר כריכים מסודר ונקי", "תצוגת מאפים נקייה", "שולחנות ורצפה נקיים"] },
                { cat: "פגי תוקף", qs: ["בדיקת תוקף כריכים וסלטים ב-TA", "בדיקת תוקף חלב ומוצריו", "בדיקת תוקף מאפים ותאריכי אפייה", "סימון תוקף על סירופים לקפה"] }
            ]
        },
        "marlog": {
            name: "פגי תוקף ומרלו\"ג",
            data: [
                { cat: "מקררים", qs: ["מקרר 15 (ירקות מחוטאים) - פגי תוקף", "מקרר 16 (ירקות גולמי) - פגי תוקף", "סידור FIFO בכל המקררים", "ניקיון רצפה ומדפים במקררים", "תקינות גומיות איטום בדלתות"] },
                { cat: "מחסן יבש", qs: ["סדר כללי על המדפים", "הגבהה מהרצפה (משטחים)", "בדיקת פגי תוקף במוצרים יבשים", "פינוי קרטונים ריקים וניקיון"] },
                { cat: "כללי", qs: ["תיעוד קבלת סחורה", "תיעוד טמפרטורות יומי", "הדברה - מלכודות תקינות"] }
            ]
        }
    };

    let session = { scores: {}, type: "", inspector: "", score: 0, date: null, prevScore: null };

    // --- לוגיקה ---

    function checkLogin() {
        if(document.getElementById('login_pass').value === "2024") showPage('menu_page');
        else alert("קוד שגוי");
    }

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.getElementById(id).classList.add('active-page');
        window.scrollTo(0,0);
        if(id === 'menu_page') refreshStats();
    }

    function initForm() {
        const type = document.getElementById('form_select').value;
        const mount = document.getElementById('form_mount');
        if(!type) { mount.innerHTML = ""; return; }
        
        const config = MASTER_DB[type];
        session = { scores: {}, type: type, inspector: "", score: 0, date: Date.now() };
        
        const history = JSON.parse(localStorage.getItem('qc_intel_v12_history') || '[]');
        const last = history.find(h => h.type === type);
        const prevGauge = document.getElementById('gauge_prev');
        const trend = document.getElementById('trend_icon');
        
        if(last) {
            prevGauge.innerText = last.score + "%";
            session.prevScore = last.score;
        } else {
            prevGauge.innerText = "--";
            session.prevScore = null;
        }
        trend.innerHTML = "";

        let html = "";
        config.data.forEach((section, sIdx) => {
            html += `<div class="category-header"><span>${section.cat}</span></div>`;
            section.qs.forEach((q, qIdx) => {
                const qId = `q_${sIdx}_${qIdx}`;
                html += `
                <div class="audit-row" id="row_${qId}">
                    <div style="font-size:18px; font-weight:700;">${q}</div>
                    <div class="score-flex">
                        <button class="btn-score btn-pass" onclick="setScore('${qId}', 1, this)">תקין</button>
                        <button class="btn-score btn-fail" onclick="setScore('${qId}', 0, this)">ליקוי</button>
                        <button class="btn-score btn-na" onclick="setScore('${qId}', -1, this)">N/A</button>
                    </div>
                    <textarea id="note_${qId}" class="note-area" placeholder="פרט את הליקוי..."></textarea>
                </div>`;
            });
        });

        mount.innerHTML = html;
        document.getElementById('footer_zone').style.display = 'block';
        updateUI();
    }

    function setScore(id, val, btn) {
        session.scores[id] = val;
        btn.parentElement.querySelectorAll('.btn-score').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(`row_${id}`).classList.add('active');
        document.getElementById(`note_${id}`).style.display = (val === 0) ? "block" : "none";
        updateUI();
    }

    function updateUI() {
        let sum = 0, count = 0;
        for(let k in session.scores) {
            if(session.scores[k] !== -1) { sum += session.scores[k]; count++; }
        }
        const score = count > 0 ? Math.round((sum / count) * 100) : 0;
        session.score = score;
        const gauge = document.getElementById('gauge_live');
        const trend = document.getElementById('trend_icon');
        gauge.innerText = score + "%";
        
        if(score >= 85) gauge.style.borderColor = "var(--success)";
        else if(score >= 70) gauge.style.borderColor = "var(--warning)";
        else gauge.style.borderColor = "var(--danger)";

        if(session.prevScore !== null) {
            if(score > session.prevScore) { trend.innerHTML = "🔼"; trend.style.color = "var(--success)"; }
            else if(score < session.prevScore) { trend.innerHTML = "🔽"; trend.style.color = "var(--danger)"; }
            else trend.innerHTML = "⏺";
        }
    }

    function refreshStats() {
        const history = JSON.parse(localStorage.getItem('qc_intel_v12_history') || '[]');
        document.getElementById('stat_count').innerText = history.length;
        if(history.length > 0) {
            const avg = Math.round(history.reduce((a,b) => a + b.score, 0) / history.length);
            document.getElementById('stat_avg').innerText = avg + "%";
            document.getElementById('stat_last').innerText = new Date(history[0].date).toLocaleDateString('he-IL');
        }
    }

    function openHistory() {
        const history = JSON.parse(localStorage.getItem('qc_intel_v12_history') || '[]');
        const list = document.getElementById('history_list');
        if(history.length === 0) list.innerHTML = "<p>אין דוחות.</p>";
        else {
            list.innerHTML = history.map(h => `
                <div class="history-item">
                    <div>
                        <h4>${MASTER_DB[h.type].name}</h4>
                        <p>${new Date(h.date).toLocaleDateString('he-IL')} | ${h.inspector}</p>
                    </div>
                    <div style="font-size:24px; font-weight:900; color:var(--intel-blue);">${h.score}%</div>
                </div>
            `).join('');
        }
        showPage('history_page');
    }

    function saveAudit() {
        session.inspector = document.getElementById('inspector_name').value || "לא צוין";
        if(session.inspector === "לא צוין") { alert("הכנס שם מבקר"); return; }
        let history = JSON.parse(localStorage.getItem('qc_intel_v12_history') || '[]');
        history.unshift(session);
        localStorage.setItem('qc_intel_v12_history', JSON.stringify(history));
        document.getElementById('modal_pdf').style.display = 'block';
    }

    function exportPDF() {
        const config = MASTER_DB[session.type];
        const zone = document.getElementById('pdf_export_zone');
        let html = `
            <div style="text-align:center; border-bottom:8px solid var(--intel-blue); padding-bottom:40px; margin-bottom:50px;">
                <h1 style="color:#0071c5; font-size:44px;">דוח בקרת אימות איכות - אינטל חיפה</h1>
                <h2>${config.name}</h2>
                <div style="font-size:22px; margin-top:30px; background:#f8f9fa; padding:30px; border-radius:15px; display:inline-block; border:2px solid #eee; min-width:650px;">
                    <strong>מבקר:</strong> ${session.inspector} | <strong>תאריך:</strong> ${new Date(session.date).toLocaleDateString('he-IL')} | <strong>ציון:</strong> ${session.score}%
                </div>
            </div>
            <table class="pdf-table">
                <thead><tr><th>הסעיף</th><th>סטטוס</th><th>הערות</th></tr></thead>
                <tbody>`;
        config.data.forEach((sec, sIdx) => {
            html += `<tr class="pdf-cat-row"><td colspan="3">${sec.cat}</td></tr>`;
            sec.qs.forEach((q, qIdx) => {
                const id = `q_${sIdx}_${qIdx}`;
                const val = session.scores[id];
                const note = document.getElementById(`note_${id}`).value || "-";
                let st = val === 1 ? "תקין" : (val === 0 ? "ליקוי" : "N/A");
                html += `<tr><td style="font-weight:700;">${q}</td><td style="text-align:center;">${st}</td><td>${note}</td></tr>`;
            });
        });
        html += `</tbody></table>`;
        const summary = document.getElementById('audit_summary').value;
        if(summary) html += `<div style="margin-top:50px; padding:35px; border:4px solid #0071c5; background:#fcfcfc;"><h3>סיכום מנהלים:</h3><p style="font-size:19px; line-height:1.8;">${summary}</p></div>`;
        zone.innerHTML = html;

        const opt = {
            margin: 12,
            filename: `Intel_QC_${session.inspector}.pdf`,
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2, useCORS: true, width: 1250, windowWidth: 1250 },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        html2pdf().set(opt).from(zone).output('blob').then(blob => {
            const file = new File([blob], "Report.pdf", { type: 'application/pdf' });
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                navigator.share({ files: [file], title: 'דוח ביקורת איכות' });
            } else {
                window.open(URL.createObjectURL(blob));
            }
            document.getElementById('modal_pdf').style.display = 'none';
        });
    }

    window.onload = refreshStats;
</script>
</body>
</html>
