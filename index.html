<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת בקרת איכות - אינטל חיפה</title>
    <style>
        :root { --p: #0071c5; --bg: #f4f6f7; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 20px; text-align: center; }
        .header { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-bottom: 4px solid var(--p); margin-bottom: 25px; }
        h1 { color: var(--p); margin: 0; font-size: 22px; }
        p { color: #666; font-size: 14px; margin-top: 10px; }
        .menu-grid { display: grid; grid-template-columns: 1fr; gap: 15px; max-width: 400px; margin: auto; }
        .menu-btn { 
            background: white; border: 2px solid #ddd; padding: 20px; border-radius: 12px; 
            font-size: 18px; font-weight: bold; color: #333; cursor: pointer;
            display: flex; align-items: center; justify-content: space-between;
            transition: 0.2s; text-decoration: none;
        }
        .menu-btn:active { transform: scale(0.98); background: #f0f8ff; border-color: var(--p); }
        .icon { font-size: 24px; }
        .footer { margin-top: 40px; font-size: 12px; color: #999; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🏢 לוח בקרה - ניהול דוחות</h1>
        <p>אינטל חיפה | ברוך הבא, בחר דוח לביצוע:</p>
    </div>
    <div class="menu-grid">
        <a href="INTEL_HAIFA.HTML" class="menu-btn">
            <span>📋 דוח אינטל חיפה</span>
            <span class="icon">⬅️</span>
        </a>
        <a href="shimis.html" class="menu-btn">
            <span>👨‍🍳 דוח שימיס (Shimis)</span>
            <span class="icon">⬅️</span>
        </a>
        <a href="intel.html" class="menu-btn">
            <span>📊 דוח אינטל כללי</span>
            <span class="icon">⬅️</span>
        </a>
    </div>
    <div class="footer">מערכת בקרת איכות מאובטחת v3.0</div>
</body>
</html>
