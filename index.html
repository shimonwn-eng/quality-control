<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Intel QC Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --p: #0071c5; --d: #003c71; --g: #27ae60; --y: #f39c12; --r: #e74c3c; --na: #95a5a6; --bg: #f4f7f9; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: system-ui, sans-serif; background: var(--bg); margin: 0; padding: 0; direction: rtl; }
        .page { display: none; min-height: 100vh; }
        .active-page { display: block; }
        #login_page { background: var(--d); display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-card { background: white; padding: 30px; border-radius: 20px; text-align: center; width: 90%; max-width: 350px; }
        .pin-input { width: 100%; padding: 15px; border: 2px solid #ddd; border-radius: 12px; font-size: 32px; text-align: center; margin: 20px 0; outline: none; }
        .dashboard { position: sticky; top: 0; z-index: 1000; background: white; padding: 10px; display: flex; justify-content: space-around; border-bottom: 3px solid var(--p); }
        .stat-val { display: block; font-weight: 900; font-size: 18px; color: var(--p); }
        .container { padding: 15px; max-width: 800px; margin: auto; padding-bottom: 100px; }
        .card { background: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .score-group { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-top: 10px; }
        .btn-s { padding: 12px 2px; border: 1.5px solid #eee; border-radius: 8px; font-size: 11px; font-weight: bold; background: #f9f9f9; cursor: pointer; }
        .btn-s.active[data-v="100"] { background: var(--g); color: white; }
        .btn-s.active[data-v="50"] { background: var(--y); color: white; }
        .btn-s.active[data-v="0"] { background: var(--r); color: white; }
        .btn-s.active[data-v="-1"] { background: var(--na); color: white; }
        .cam-btn { display: block; margin-top: 10px; background: #edf2f7; padding: 10px; text-align: center; border-radius: 10px; font-weight: bold; cursor: pointer; color: var(--d); }
        .btn-main { background: var(--p); color: white; width: 100%; padding: 18px; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; margin-top: 10px; }
        #pdf_zone { position: absolute; left: -10000px; width: 850px; background: white; padding: 40px; direction: rtl; }
        .pdf-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .pdf-table th, .pdf-table td { border: 1px solid #000; padding: 10px; text-align: right; font-size: 12px; }
    </style>
</head>
<body>

<div id="login_page" class="page active-page">
    <div class="login-card">
        <h2 style="color:var(--p)">Intel QC</h2>
        <p>הקש קוד גישה (2024)</p>
        <input type="tel" id="pin" class="pin-input" maxlength="4" placeholder="----" oninput="if(this.value.trim()=='2024') showPage('menu_page')">
        <button class="btn-main" onclick="if(document.getElementById('pin').value.trim()=='2024') showPage('menu_page')">כניסה</button>
    </div>
</div>

<div id="menu_page" class="page">
    <div class="container" style="text-align:center; padding-top:50px;">
        <h2 style="color:var(--d)">מערכת בקרות איכות</h2>
        <button class="btn-main" onclick="showPage('audit_page')">➕ ביקורת חדשה</button>
    </div>
</div>

<div id="audit_page" class="page">
    <div class="dashboard">
        <div class="stat"><span id="live_score" class="stat-val">0%</span><span>ציון נוכחי</span></div>
        <button onclick="showPage('menu_page')" style="border:none; background:none; font-size:24px;">🏠</button>
    </div>
    <div class="container">
        <div class="card">
            <label>מבקר:</label><input type="text" id="inspector" style="width:100%; padding:10px; margin-bottom:10px; border-radius:8px; border:1px solid #ddd;">
            <label>מתחם:</label>
            <select id="form_type" onchange="initForm()" style="width:100%; padding:12px; border-radius:10px; border:2px solid var(--p); font-weight:bold;">
                <option value="">-- בחר --</option>
                <option value="nd_expiry">ניין דיין - פגי תוקף</option>
                <option value="marlog">מרלו"ג - תוקף וניקיון</option>
            </select>
        </div>
        <div id="form_mount"></div>
        <div id="audit_footer" style="display:none;">
            <button class="btn-main" onclick="finishAudit()">💾 הפק PDF וסיים</button>
        </div>
    </div>
</div>

<div id="pdf_zone"></div>

<script>
    const DB = {
        "nd_expiry": { name: "פגי תוקף - Nine Dine", cats: [{ t: "מקררים", qs: ["מקרר 4 - מוגמר", "מקרר 3 - קצבייה", "מקרר 8 - הפשרת עוף", "מקרר 5 - הפשרת בקר"] }]},
        "marlog": { name: "מרלו\"ג", cats: [{ t: "מחסן", qs: ["מקרר 15 - ירקות", "מקרר 16 - גולמי"] }]}
    };
    let session = { scores: {}, notes: {}, photos: {}, type: "", ins: "", score: 0 };
    function showPage(p) {
        document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active-page'));
        document.getElementById(p).classList.add('active-page');
    }
    function initForm() {
        const type = document.getElementById('form_type').value;
        if(!type) return;
        session.type = type;
        let html = "";
        DB[type].cats.forEach((c, ci) => {
            html += `<div style="background:var(--p); color:white; padding:10px; border-radius:8px; margin-top:20px;">${c.t}</div>`;
            c.qs.forEach((q, qi) => {
                const id = `q_${ci}_${qi}`;
                html += `<div class="card">
                    <div style="font-weight:bold;">${q}</div>
                    <div class="score-group">
                        <button class="btn-s" data-v="100" onclick="setS('${id}', 100, this)">תקין</button>
                        <button class="btn-s" data-v="50" onclick="setS('${id}', 50, this)">חלקי</button>
                        <button class="btn-s" data-v="0" onclick="setS('${id}', 0, this)">ליקוי</button>
                        <button class="btn-s" data-v="-1" onclick="setS('${id}', -1, this)">N/A</button>
                    </div>
                    <textarea class="pin-input" style="font-size:14px; height:60px; letter-spacing:0;" placeholder="הערה..." oninput="session.notes['${id}']=this.value"></textarea>
                    <label class="cam-btn" onclick="document.getElementById('cam_${id}').click()">📸 צילום</label>
                    <input type="file" id="cam_${id}" style="display:none" accept="image/*" onchange="handleImg('${id}', this)">
                    <div id="pre_${id}"></div>
                </div>`;
            });
        });
        document.getElementById('form_mount').innerHTML = html;
        document.getElementById('audit_footer').style.display = 'block';
    }
    function setS(id, val, btn) {
        session.scores[id] = val;
        btn.parentElement.querySelectorAll('.btn-s').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        calc();
    }
    function handleImg(id, input) {
        const reader = new FileReader();
        reader.onload = e => {
            session.photos[id] = e.target.result;
            document.getElementById('pre_'+id).innerHTML = `<img src="${e.target.result}" style="width:70px; margin-top:5px; border-radius:5px;">`;
        };
        reader.readAsDataURL(input.files[0]);
    }
    function calc() {
        let s = 0, count = 0;
        for(let k in session.scores) { if(session.scores[k] !== -1) { s += session.scores[k]; count++; } }
        session.score = count > 0 ? Math.round(s/count) : 0;
        document.getElementById('live_score').innerText = session.score + "%";
    }
    function finishAudit() {
        session.ins = document.getElementById('inspector').value;
        if(!session.ins) return alert("הכנס שם מבקר");
        exportPDF();
    }
    function exportPDF() {
        const config = DB[session.type];
        let html = `<h1>דוח ביקורת - ${config.name}</h1><p>מבקר: ${session.ins} | ציון: ${session.score}%</p><table class="pdf-table"><thead><tr><th>סעיף</th><th>ציון</th><th>הערה</th><th>תמונה</th></tr></thead><tbody>`;
        config.cats.forEach((c, ci) => {
            c.qs.forEach((q, qi) => {
                const id = `q_${ci}_${qi}`;
                const val = session.scores[id] == 100 ? "תקין" : (session.scores[id] == 50 ? "חלקי" : (session.scores[id] == 0 ? "ליקוי" : "N/A"));
                const img = session.photos[id] ? `<img src="${session.photos[id]}" style="width:60px;">` : "";
                html += `<tr><td>${q}</td><td>${val}</td><td>${session.notes[id] || ""}</td><td>${img}</td></tr>`;
            });
        });
        html += `</tbody></table>`;
        document.getElementById('pdf_zone').innerHTML = html;
        html2pdf().set({ margin: 10, filename: 'Audit.pdf' }).from(document.getElementById('pdf_zone')).save().then(() => location.reload());
    }
</script>
</body>
</html>
