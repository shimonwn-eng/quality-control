<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>מערכת בקרת איכות - אינטל חיפה</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root { --p: #0071c5; --g: #27ae60; --y: #f39c12; --r: #e74c3c; --na: #95a5a6; --bg: #f4f6f7; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 0; }
        
        /* עיצוב הממשק בטלפון */
        .dashboard { position: sticky; top: 0; z-index: 1000; background: white; padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-bottom: 3px solid var(--p); }
        .dash-top { display: flex; justify-content: space-between; align-items: center; }
        .gauge-bg { width: 70px; height: 70px; border-radius: 50%; border: 5px solid #eee; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: bold; color: var(--p); }
        
        .container { padding: 15px; max-width: 500px; margin: auto; }
        .card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        
        .cat-title { background: var(--p); color: white; padding: 10px; border-radius: 6px; margin: 20px 0 10px; font-weight: bold; text-align: center; }
        .audit-item { background: white; padding: 12px; border-radius: 10px; margin-bottom: 10px; border-right: 5px solid #ddd; }
        
        .score-row { display: flex; gap: 4px; margin-top: 10px; }
        .score-btn { flex: 1; padding: 10px 2px; border: 1px solid #ddd; background: #f9f9f9; border-radius: 6px; font-size: 12px; font-weight: bold; cursor: pointer; }
        .btn-pass.active { background: var(--g); color: white; }
        .btn-part.active { background: var(--y); color: white; }
        .btn-fail.active { background: var(--r); color: white; }
        .btn-na.active { background: var(--na); color: white; }

        .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-primary { background: var(--p); color: white; }
        
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; padding: 20px; box-sizing: border-box; }
        .modal-body { background: white; padding: 20px; border-radius: 15px; max-width: 400px; margin: 100px auto; text-align: center; }

        /* --- אזור ה-PDF: דוח צר שלא ניתן לחתוך --- */
        #pdf-wrapper { 
            position: absolute; left: -5000px; top: 0; 
            direction: ltr !important; /* אמא LTR - נקודת אפס למצלמה */
        }
        #pdf-content { 
            width: 400px; /* רוחב מובייל צר */
            background: white; padding: 20px; 
            direction: rtl !important; /* תוכן עברית */
            color: black; font-family: Arial, sans-serif;
        }
        .pdf-header { text-align: center; border-bottom: 3px solid var(--p); padding-bottom: 15px; margin-bottom: 15px; }
        .pdf-card { 
            border: 1px solid #eee; padding: 10px; margin-bottom: 8px; border-radius: 5px; 
            background: #fff; page-break-inside: avoid;
        }
    </style>
</head>
<body>

<div id="ui">
    <div class="dashboard">
        <div class="dash-top">
            <div><div id="g-curr" class="gauge-bg">0%</div></div>
            <div style="flex:1; margin:0 15px;"><input type="text" id="insp_name" placeholder="שם המבקר/ת" style="width:100%; padding:10px; border:1px solid #ccc; border-radius:8px;"></div>
            <div id="g-status" style="font-size:12px; font-weight:bold; color:var(--p)">ממתין</div>
        </div>
    </div>

    <div class="container">
        <select id="form_selector" onchange="loadForm()" style="width:100%; padding:15px; border-radius:10px; border:2px solid var(--p); font-size:16px; font-weight:bold;">
            <option value="">-- בחר טופס --</option>
            <option value="clean_ninedine">סיור ניקיון - Nine Dine</option>
            <option value="food_ninedine">בטיחות מזון - Nine Dine</option>
            <option value="expiry_marlog">פגי תוקף - מרלו"ג</option>
        </select>

        <div id="questions_area"></div>
        
        <div id="summary_card" style="display:none" class="card">
            <textarea id="gen_note" rows="3" placeholder="הערות לסיכום..." style="width:100%; border-radius:8px; padding:10px; border:1px solid #ccc; box-sizing:border-box;"></textarea>
            <button class="btn btn-primary" onclick="document.getElementById('modal').style.display='block'">💾 הפק דוח PDF</button>
        </div>
    </div>
</div>

<div id="modal">
    <div class="modal-body">
        <h2 style="color:var(--p)">דוח מוכן</h2>
        <p>הדוח מוכן לשליחה בוואטסאפ.</p>
        <button class="btn btn-primary" onclick="generatePDF()">📤 שלח דוח PDF עכשיו</button>
        <button class="btn" style="background:#eee;" onclick="document.getElementById('modal').style.display='none'">ביטול</button>
    </div>
</div>

<div id="pdf-wrapper">
    <div id="pdf-content">
        <div class="pdf-header">
            <h2 style="color:var(--p); margin:0;">ביקורת איכות אינטל</h2>
            <div id="pdf-title" style="font-weight:bold; margin:5px 0;"></div>
            <div style="font-size:13px;">מבקר: <span id="pdf-insp"></span> | <span id="pdf-date"></span></div>
            <div id="pdf-score" style="margin-top:10px; font-size:20px; font-weight:bold;"></div>
        </div>
        <div id="pdf-body"></div>
    </div>
</div>

<script>
    const formsDB = {
        "clean_ninedine": { title: "ניקיון - Nine Dine", schema: [
            { cat: "רחבת כניסה", qs: ["אזור הקופות נקי", "עמדת הצטיידות נקייה", "עמדת שטיפת ידיים", "כניסה לחדר אוכל"] },
            { cat: "עמדות הגשה", qs: ["פלנצ'ות נקיות", "מנדפים נקיים", "דלפקי הגשה", "פסים קרים/חמים"] }
        ]},
        "food_ninedine": { title: "בטיחות מזון - Nine Dine", schema: [
            { cat: "קירור", qs: ["הפרדה גולמי/מוכן", "מזון מכוסה ומתועד", "אחסון ביצים", "מדבקות פתיחה"] }
        ]},
        "expiry_marlog": { title: "פגי תוקף - מרלו\"ג", schema: [
            { cat: "מחסן", qs: ["ניקיון וסדר", "הגבהה מהרצפה", "בדיקת FIFO", "פגי תוקף יבשים"] }
        ]}
    };

    let scores = {};
    let currentId = "";

    function loadForm() {
        currentId = document.getElementById('form_selector').value;
        if(!currentId) return;
        scores = {};
        let h = "";
        formsDB[currentId].schema.forEach((s, si) => {
            h += `<div class="cat-title">${s.cat}</div>`;
            s.qs.forEach((q, qi) => {
                const id = `q_${si}_${qi}`;
                h += `<div class="audit-item">
                    <div style="font-weight:bold; font-size:14px;">${q}</div>
                    <div class="score-row">
                        <button class="score-btn btn-pass" onclick="setScore('${id}', 1, this)">תקין</button>
                        <button class="score-btn btn-fail" onclick="setScore('${id}', 0, this)">ליקוי</button>
                        <button class="score-btn btn-na" onclick="setScore('${id}', -1, this)">N/A</button>
                    </div>
                    <input type="text" id="n_${id}" placeholder="הערה..." style="width:100%; margin-top:5px; padding:5px; border:1px solid #eee;">
                </div>`;
            });
        });
        document.getElementById('questions_area').innerHTML = h;
        document.getElementById('summary_card').style.display = 'block';
    }

    function setScore(id, v, b) {
        scores[id] = v;
        b.parentElement.querySelectorAll('button').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        let c=0, s=0;
        for(let k in scores) { if(scores[k]!==-1){ c++; s+=scores[k]; } }
        let p = c ? Math.round((s/c)*100) : 0;
        document.getElementById('g-curr').innerText = p + "%";
        document.getElementById('g-status').innerText = p >= 85 ? "עובר ✅" : "נכשל ❌";
    }

    function generatePDF() {
        const f = formsDB[currentId];
        document.getElementById('pdf-title').innerText = f.title;
        document.getElementById('pdf-insp').innerText = document.getElementById('insp_name').value || "לא צוין";
        document.getElementById('pdf-date').innerText = new Date().toLocaleDateString('he-IL');
        document.getElementById('pdf-score').innerText = "ציון: " + document.getElementById('g-curr').innerText;
        
        let bh = "";
        f.schema.forEach((s, si) => {
            bh += `<h3 style="color:var(--p); border-bottom:1px solid #ddd; padding-bottom:5px;">${s.cat}</h3>`;
            s.qs.forEach((q, qi) => {
                const id = `q_${si}_${qi}`;
                const v = scores[id];
                if(v !== undefined) {
                    let st = v===1 ? "תקין" : (v===0 ? "ליקוי" : "N/A");
                    let note = document.getElementById('n_'+id).value;
                    bh += `<div class="pdf-card">
                        <div style="font-weight:bold;">${q}</div>
                        <div style="font-size:13px; margin-top:3px;">סטטוס: <span style="color:${v===1?'green':'red'}">${st}</span></div>
                        ${note ? `<div style="font-size:12px; color:#666;">הערה: ${note}</div>` : ''}
                    </div>`;
                }
            });
        });
        const gn = document.getElementById('gen_note').value;
        if(gn) bh += `<div style="margin-top:15px; padding:10px; background:#fff3cd; font-size:13px;"><strong>סיכום:</strong><br>${gn}</div>`;
        
        document.getElementById('pdf-body').innerHTML = bh;
        const el = document.getElementById('pdf-content');

        const opt = {
            margin: 5,
            filename: 'report.pdf',
            html2canvas: { scale: 2, useCORS: true, scrollX:0, scrollY:0, windowWidth: 400, width: 400 },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        html2pdf().set(opt).from(el).output('blob').then(blob => {
            const file = new File([blob], "Audit_Report.pdf", { type: "application/pdf" });
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                navigator.share({ files: [file], title: 'דוח ביקורת' });
            } else {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url; a.download = "Report.pdf"; a.click();
            }
        });
    }
</script>
</body>
</html>
