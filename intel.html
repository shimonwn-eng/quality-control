<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>מערכת בקרת איכות - אינטל חיפה (ניר עציון)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root { --p: #0071c5; --s: #00aeef; --g: #27ae60; --y: #f39c12; --r: #e74c3c; --na: #95a5a6; --bg: #f4f6f7; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 0; color: #333; }
        
        /* עיצוב מסך כניסה ותפריטים */
        .dashboard { position: sticky; top: 0; z-index: 1000; background: white; padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-bottom: 3px solid var(--p); }
        .dash-top { display: flex; justify-content: space-between; margin-bottom: 12px; }
        .gauge-container { text-align: center; width: 32%; }
        .gauge-label { font-size: 12px; font-weight: bold; margin-bottom: 5px; color: #666; white-space: nowrap; }
        .gauge-bg { width: 70px; height: 70px; border-radius: 50%; border: 6px solid #eee; margin: auto; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 900; transition: 0.5s; color: var(--p); }
        .dash-inputs { display: flex; gap: 10px; }
        .dash-inputs input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; margin-bottom: 0; }

        .container { padding: 15px; max-width: 600px; margin: auto; }
        .card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 5px; color: var(--p); }
        select, textarea, input[type="time"] { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; margin-bottom: 10px; box-sizing: border-box; background: #fff; }

        .cat-title { background: var(--p); color: white; padding: 12px; border-radius: 6px; margin: 25px 0 10px; font-weight: bold; font-size: 16px; text-align: center; }
        .audit-item { background: white; padding: 12px; border-radius: 10px; margin-bottom: 12px; border-right: 5px solid #ddd; }
        .question-text { font-weight: 600; margin-bottom: 10px; font-size: 14px; }
        
        .score-row { display: flex; gap: 5px; margin-bottom: 8px; }
        .score-btn { flex: 1; padding: 10px 5px; border: 1px solid #ddd; background: #f9f9f9; border-radius: 6px; font-weight: bold; font-size: 13px; cursor: pointer; transition: 0.2s; text-align: center; }
        .btn-pass.active { background: var(--g); color: white; border-color: var(--g); }
        .btn-fail.active { background: var(--r); color: white; border-color: var(--r); }
        .btn-na.active { background: var(--na); color: white; border-color: var(--na); }

        .btn { width: 100%; padding: 16px; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; display: block; text-align: center; }
        .btn-primary { background: var(--p); color: white; }
        
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; overflow-y: auto; padding: 15px; box-sizing: border-box; }
        .modal-body { background: white; padding: 20px; border-radius: 12px; max-width: 600px; margin: auto; margin-top: 20px;}

        .history-item { background: white; padding: 15px; border-radius: 8px; border: 1px solid #ccc; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }

        /* אזור ההדפסה הנסתר */
        #print-area { display: none; width: 800px; background: white; padding: 20px; direction: rtl; }
    </style>
</head>
<body>

<div id="login" class="container" style="padding: 50px 20px; text-align: center;">
    <h2>🏢 מערכת בקרת איכות</h2>
    <p style="color: #666;">אינטל חיפה - ניר עציון</p>
    <div style="background: #e8f4f8; padding: 10px; border-radius: 8px; margin-top: 15px; font-size: 12px; color: #0071c5; border: 1px solid #bce8f1;">
        🔒 סביבה מאובטחת. הנתונים מוצפנים ונשמרים במכשיר זה בלבד.
    </div>
    <input type="password" id="pass" placeholder="קוד גישה (2024)" style="margin-top: 20px; width: 100%; padding: 12px; font-size:16px; border-radius:8px; border:1px solid #ccc;">
    <button class="btn btn-primary" onclick="checkPass()">כניסה למערכת</button>
</div>

<div id="startup_menu" class="container" style="display:none; text-align: center; padding: 50px 20px;">
    <h2>🏢 תפריט ראשי</h2>
    <button class="btn btn-primary" onclick="startNewAudit()">➕ התחל ביקורת חדשה</button>
    <button class="btn" style="background:#f39c12; color:white; margin-top:20px;" onclick="showHistoryMenu()">📂 ערוך ביקורת קודמת</button>
</div>

<div id="history_menu" class="container" style="display:none;">
    <h2 style="text-align: center;">📂 ביקורות קודמות</h2>
    <div id="history_list"></div>
    <button class="btn" style="background:#666; color:white; margin-top:20px;" onclick="backToStartup()">חזור</button>
</div>

<div id="app" style="display:none;">
    <div class="dashboard">
        <div class="dash-top">
            <div class="gauge-container"><div class="gauge-label">ציון נוכחי</div><div id="g-curr" class="gauge-bg">0%</div></div>
            <div class="gauge-container"><div class="gauge-label">סטטוס</div><div id="g-status" class="gauge-bg" style="font-size:14px;">ממתין</div></div>
        </div>
        <div class="dash-inputs"><input type="text" id="insp_name" placeholder="שם המבקר/ת"></div>
    </div>

    <div class="container">
        <div class="card">
            <label>בחר טופס לביצוע:</label>
            <select id="form_selector" onchange="loadForm()" style="border: 2px solid var(--p); font-weight: bold;">
                <option value="">-- בחר טופס --</option>
                <optgroup label="🧹 סיורי ניקיון">
                    <option value="clean_ninedine">סיור ניקיון - Nine Dine</option>
                    <option value="clean_bento">סיור ניקיון - Bento</option>
                    <option value="clean_nona">סיור ניקיון - Nona</option>
                </optgroup>
                <optgroup label="🍔 בטיחות במזון">
                    <option value="food_ninedine">בטיחות מזון - Nine Dine</option>
                </optgroup>
                <optgroup label="📅 פגי תוקף ו-FIFO">
                    <option value="expiry_marlog">ביקורת פגי תוקף וניקיון - מרלו"ג</option>
                </optgroup>
            </select>
        </div>

        <div id="questions_area"></div>

        <div class="card" id="summary_card" style="display:none;">
            <label>הערות מנהלים לסיכום:</label>
            <textarea id="gen_note" rows="3" placeholder="הערות לסיכום..."></textarea>
            <button class="btn btn-primary" onclick="showSummary()">💾 שמירה והפקת דוח PDF</button>
        </div>
    </div>
</div>

<div id="modal">
    <div class="modal-body">
        <h2 style="color:var(--p)">📋 הדוח נשמר!</h2>
        <div id="sum-text" style="white-space: pre-wrap; font-size: 14px; background: #f9f9f9; padding: 10px; border-radius: 8px; margin-bottom: 15px;"></div>
        <button class="btn btn-primary" onclick="generatePDF()">📤 שלח PDF בוואטסאפ</button>
        <button class="btn" style="background:#666; color:white" onclick="document.getElementById('modal').style.display='none'">חזור</button>
    </div>
</div>

<div id="print-area"></div>

<script>
    const formsDB = {
        "clean_ninedine": { title: "סיור ניקיון - Nine Dine", schema: [
            { cat: "רחבת כניסה", qs: ["האם איזור הקופות נקי", "עמדת הצטיידות נקייה", "עמדת שטיפת ידיים נקייה", "כניסה לחדר אוכל נקי"] },
            { cat: "עמדות הגשה", qs: ["פלנצ'ות נקיות", "מנדפים נקיים", "דלפקי הגשה נקיים", "פסים קרים וחמים נקיים"] }
        ]},
        "clean_bento": { title: "סיור ניקיון - Bento", schema: [
            { cat: "חדר אוכל", qs: ["ריצפה נקייה", "שולחנות וכסאות נקיים", "אזור חומוס נקי"] }
        ]},
        "food_ninedine": { title: "בטיחות מזון - Nine Dine", schema: [
            { cat: "מערכות קירור", qs: ["הפרדה בין גולמי למוכן?", "מזון מכוסה/עטוף?", "מדבקות תאריך פתיחה?"] }
        ]},
        "expiry_marlog": { title: "פגי תוקף וניקיון - מרלו\"ג", schema: [
            { cat: "מחסנים", qs: ["מחסן ראשי - מסודר? הגבהה?", "בדיקת FIFO?", "פגי תוקף במוצרים יבשים?"] }
        ]}
    };

    let userScores = {};
    let currentFormId = "";

    function checkPass() {
        if(document.getElementById('pass').value === "2024") {
            document.getElementById('login').style.display = 'none';
            document.getElementById('startup_menu').style.display = 'block';
        } else alert("קוד שגוי");
    }

    function startNewAudit() {
        document.getElementById('startup_menu').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        document.getElementById('form_selector').value = "";
        document.getElementById('questions_area').innerHTML = "";
    }

    function loadForm() {
        currentFormId = document.getElementById('form_selector').value;
        if(!currentFormId) return;
        let html = "";
        formsDB[currentFormId].schema.forEach((sec, sIdx) => {
            html += `<div class="cat-title">${sec.cat}</div>`;
            sec.qs.forEach((q, qIdx) => {
                const qId = `q_${sIdx}_${qIdx}`;
                html += `
                <div class="audit-item" id="item_${qId}">
                    <div class="question-text">${q}</div>
                    <div class="score-row">
                        <button class="score-btn btn-pass" onclick="setScore('${qId}', 1, this)">✅ תקין</button>
                        <button class="score-btn btn-fail" onclick="setScore('${qId}', 0, this)">❌ ליקוי</button>
                        <button class="score-btn btn-na" onclick="setScore('${qId}', -1, this)">➖ N/A</button>
                    </div>
                    <input type="text" id="note_${qId}" placeholder="הערה..." style="width:100%; padding:8px; border-radius:5px; border:1px solid #eee;">
                </div>`;
            });
        });
        document.getElementById('questions_area').innerHTML = html;
        document.getElementById('summary_card').style.display = 'block';
    }

    function setScore(qId, val, btn) {
        userScores[qId] = val;
        btn.parentElement.querySelectorAll('.score-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        calcScore();
    }

    function calcScore() {
        let count = 0, sum = 0;
        for (let k in userScores) { if(userScores[k] !== -1) { count++; sum += userScores[k]; } }
        let pct = count ? Math.round((sum/count)*100) : 0;
        document.getElementById('g-curr').innerText = pct + "%";
        document.getElementById('g-status').innerText = pct >= 85 ? "עובר ✅" : "נכשל ❌";
    }

    function buildPDFHTML() {
        const form = formsDB[currentFormId];
        let html = `<div style="direction:rtl; text-align:right; font-family:Arial;">
            <h1 style="color:#0071c5; text-align:center;">דוח ביקורת איכות - אינטל חיפה</h1>
            <h2 style="text-align:center;">${form.title}</h2>
            <p style="text-align:center;">מבקר/ת: ${document.getElementById('insp_name').value} | תאריך: ${new Date().toLocaleDateString()}</p>
            <div style="text-align:center; margin:20px;"><span style="background:#0071c5; color:white; padding:10px 20px; border-radius:8px;">ציון: ${document.getElementById('g-curr').innerText}</span></div>`;

        form.schema.forEach((sec, sIdx) => {
            html += `<h3 style="background:#eee; padding:10px;">${sec.cat}</h3>
            <table style="width:100%; border-collapse:collapse;">
                <thead><tr style="background:#f4f4f4;"><th style="border:1px solid #ddd; padding:8px; width:50%;">סעיף</th><th style="border:1px solid #ddd; padding:8px;">סטטוס</th><th style="border:1px solid #ddd; padding:8px;">הערה</th></tr></thead><tbody>`;
            sec.qs.forEach((q, qIdx) => {
                const qId = `q_${sIdx}_${qIdx}`;
                const s = userScores[qId];
                let stTxt = s === 1 ? "תקין" : (s === 0 ? "ליקוי" : "N/A");
                html += `<tr><td style="border:1px solid #ddd; padding:8px;">${q}</td><td style="border:1px solid #ddd; padding:8px; text-align:center;">${stTxt}</td><td style="border:1px solid #ddd; padding:8px;">${document.getElementById('note_'+qId).value || "-"}</td></tr>`;
            });
            html += `</tbody></table>`;
        });
        html += `</div>`;
        document.getElementById('print-area').innerHTML = html;
    }

    function showSummary() {
        buildPDFHTML();
        document.getElementById('sum-text').innerText = "הדוח נשמר. מוכן להפקה.";
        document.getElementById('modal').style.display = 'block';
    }

    function generatePDF() {
        const el = document.getElementById('print-area');
        el.style.display = 'block';
        const opt = {
            margin: 10,
            filename: 'audit.pdf',
            html2canvas: { scale: 2, useCORS: true, width: 800, windowWidth: 800 },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };
        html2pdf().set(opt).from(el).output('blob').then(blob => {
            el.style.display = 'none';
            const file = new File([blob], "Report.pdf", { type: "application/pdf" });
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                navigator.share({ files: [file], title: 'דוח ביקורת' });
            } else {
                const url = URL.createObjectURL(blob);
                window.open(url);
            }
        });
    }
</script>
</body>
</html>
