<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>מערכת בקרת איכות - אינטל חיפה (ניר עציון)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root { --p: #0071c5; --s: #00aeef; --g: #27ae60; --y: #f39c12; --r: #e74c3c; --na: #95a5a6; --bg: #f4f6f7; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 0; color: #333; }
        
        /* מסך כניסה */
        #login { padding: 50px 20px; text-align: center; }
        .login-card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }

        /* תפריט ראשי */
        #startup_menu { text-align: center; padding: 50px 20px; }

        /* דאשבורד */
        .dashboard { position: sticky; top: 0; z-index: 1000; background: white; padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-bottom: 3px solid var(--p); }
        .dash-top { display: flex; justify-content: space-between; margin-bottom: 12px; }
        .gauge-container { text-align: center; width: 32%; }
        .gauge-label { font-size: 11px; font-weight: bold; margin-bottom: 5px; color: #666; }
        .gauge-bg { width: 65px; height: 65px; border-radius: 50%; border: 5px solid #eee; margin: auto; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 900; color: var(--p); }
        
        .container { padding: 15px; max-width: 600px; margin: auto; }
        .card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        
        label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 5px; color: var(--p); }
        select, textarea, input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; margin-bottom: 10px; box-sizing: border-box; }

        .cat-title { background: var(--p); color: white; padding: 12px; border-radius: 6px; margin: 25px 0 10px; font-weight: bold; text-align: center; }
        .audit-item { background: white; padding: 12px; border-radius: 10px; margin-bottom: 12px; border-right: 5px solid #ddd; }
        
        .score-row { display: flex; gap: 5px; margin-bottom: 8px; }
        .score-btn { flex: 1; padding: 12px 5px; border: 1px solid #ddd; background: #f9f9f9; border-radius: 6px; font-weight: bold; font-size: 13px; cursor: pointer; }
        .btn-pass.active { background: var(--g); color: white; border-color: var(--g); }
        .btn-fail.active { background: var(--r); color: white; border-color: var(--r); }
        .btn-na.active { background: var(--na); color: white; border-color: var(--na); }

        .btn { width: 100%; padding: 16px; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .btn-primary { background: var(--p); color: white; }
        
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; overflow-y: auto; padding: 15px; }
        .modal-body { background: white; padding: 20px; border-radius: 12px; max-width: 500px; margin: auto; margin-top: 50px; text-align: center; }

        /* אזור ההדפסה - מוגדר כ-LTR חיצוני כדי למנוע חיתוך באייפון */
        #print-wrapper { position: absolute; left: -9999px; top: 0; direction: ltr; }
        #print-area { width: 800px; padding: 40px; background: white; direction: rtl; }
    </style>
</head>
<body>

<div id="login">
    <div class="login-card">
        <h2>🏢 מערכת בקרת איכות</h2>
        <p>אינטל חיפה - ניר עציון</p>
        <input type="password" id="pass" placeholder="קוד גישה (2024)">
        <button class="btn btn-primary" onclick="checkPass()">כניסה</button>
    </div>
</div>

<div id="startup_menu" style="display:none;">
    <div class="container">
        <h2>ברוך הבא</h2>
        <button class="btn btn-primary" onclick="startNew()">➕ ביקורת חדשה</button>
        <button class="btn" style="background:#666; color:white; margin-top:15px;" onclick="location.reload()">🔒 התנתק</button>
    </div>
</div>

<div id="app" style="display:none;">
    <div class="dashboard">
        <div class="dash-top">
            <div class="gauge-container"><div class="gauge-label">ציון</div><div id="g-curr" class="gauge-bg">0%</div></div>
            <div class="gauge-container"><div class="gauge-label">סטטוס</div><div id="g-status" class="gauge-bg" style="font-size:14px;">ממתין</div></div>
        </div>
        <input type="text" id="insp_name" placeholder="שם המבקר/ת">
    </div>

    <div class="container">
        <div class="card">
            <label>בחר טופס:</label>
            <select id="form_selector" onchange="loadForm()" style="border: 2px solid var(--p); font-weight: bold;">
                <option value="">-- בחר --</option>
                <optgroup label="🧹 ניקיון">
                    <option value="clean_ninedine">סיור ניקיון - Nine Dine</option>
                    <option value="clean_bento">סיור ניקיון - Bento</option>
                    <option value="clean_nona">סיור ניקיון - Nona</option>
                </optgroup>
                <optgroup label="🍔 בטיחות ופגי תוקף">
                    <option value="food_ninedine">בטיחות מזון - Nine Dine</option>
                    <option value="expiry_marlog">פגי תוקף וניקיון - מרלו"ג</option>
                </optgroup>
            </select>
        </div>

        <div id="questions_area"></div>

        <div id="summary_card" class="card" style="display:none;">
            <label>הערות לסיכום:</label>
            <textarea id="gen_note" rows="3"></textarea>
            <button class="btn btn-primary" onclick="showSummary()">💾 סיים והפק דוח PDF</button>
        </div>
    </div>
</div>

<div id="modal">
    <div class="modal-body">
        <h2 style="color:var(--p)">דוח מוכן!</h2>
        <p>הדוח נשמר במערכת ומוכן לשליחה.</p>
        <button class="btn btn-primary" onclick="generatePDF()">📤 שלח PDF בוואטסאפ</button>
        <button class="btn" style="background:#666; color:white; margin-top:10px;" onclick="document.getElementById('modal').style.display='none'">חזור לעריכה</button>
    </div>
</div>

<div id="print-wrapper">
    <div id="print-area"></div>
</div>

<script>
    const formsDB = {
        "clean_ninedine": { title: "סיור ניקיון - Nine Dine", schema: [
            { cat: "רחבת כניסה", qs: ["אזור הקופות נקי", "עמדת הצטיידות נקייה", "עמדת שטיפת ידיים", "כניסה לחדר אוכל", "סבון ונייר תקינים"] },
            { cat: "עמדות הגשה", qs: ["פלנצ'ות נקיות", "מנדפים נקיים", "דלפקים נקיים", "פסים קרים וחמים", "רצפה נקייה"] }
        ]},
        "clean_bento": { title: "סיור ניקיון - Bento", schema: [
            { cat: "כללי", qs: ["עמדות הגשה נקיות", "רצפה נקייה", "שולחנות וכסאות נקיים", "אזור חומוס נקי"] }
        ]},
        "clean_nona": { title: "סיור ניקיון - Nona", schema: [
            { cat: "כללי", qs: ["עמדות הגשה נקיות", "פסים חמים/קרים", "רצפה ופחי אשפה"] }
        ]},
        "food_ninedine": { title: "בטיחות מזון - Nine Dine", schema: [
            { cat: "קירור וייצור", qs: ["הפרדה גולמי/מוכן", "מזון עטוף ומתועד", "אחסון ביצים תקין", "קוד צבעים בעבודה"] }
        ]},
        "expiry_marlog": { title: "פגי תוקף - מרלו\"ג", schema: [
            { cat: "מחסנים ומקררים", qs: ["מקרר ירקות מחוטאים", "מקפיאים נקיים", "מחסן יבש - הגבהה", "בדיקת FIFO"] }
        ]}
    };

    let userScores = {};
    let currentId = "";

    function checkPass() {
        if(document.getElementById('pass').value === "2024") {
            document.getElementById('login').style.display = 'none';
            document.getElementById('startup_menu').style.display = 'block';
        } else alert("קוד שגוי");
    }

    function startNew() {
        document.getElementById('startup_menu').style.display = 'none';
        document.getElementById('app').style.display = 'block';
    }

    function loadForm() {
        currentId = document.getElementById('form_selector').value;
        if(!currentId) return;
        let html = "";
        formsDB[currentId].schema.forEach((sec, sIdx) => {
            html += `<div class="cat-title">${sec.cat}</div>`;
            sec.qs.forEach((q, qIdx) => {
                const qId = `q_${sIdx}_${qIdx}`;
                html += `
                <div class="audit-item">
                    <div style="font-weight:bold; margin-bottom:10px;">${q}</div>
                    <div class="score-row">
                        <button class="score-btn btn-pass" onclick="setScore('${qId}', 1, this)">✅ תקין</button>
                        <button class="score-btn btn-fail" onclick="setScore('${qId}', 0, this)">❌ ליקוי</button>
                        <button class="score-btn btn-na" onclick="setScore('${qId}', -1, this)">➖ N/A</button>
                    </div>
                    <input type="text" id="note_${qId}" placeholder="הערה...">
                </div>`;
            });
        });
        document.getElementById('questions_area').innerHTML = html;
        document.getElementById('summary_card').style.display = 'block';
    }

    function setScore(qId, val, btn) {
        userScores[qId] = val;
        btn.parentElement.querySelectorAll('.score-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        calcScore();
    }

    function calcScore() {
        let count = 0, sum = 0;
        for (let k in userScores) { if(userScores[k] !== -1) { count++; sum += userScores[k]; } }
        let pct = count ? Math.round((sum/count)*100) : 0;
        document.getElementById('g-curr').innerText = pct + "%";
        document.getElementById('g-status').innerText = pct >= 85 ? "עובר ✅" : "נכשל ❌";
        document.getElementById('g-status').style.color = pct >= 85 ? "var(--g)" : "var(--r)";
    }

    function buildPDF() {
        const form = formsDB[currentId];
        let html = `<div style="font-family: Arial; direction: rtl;">
            <h1 style="color:#0071c5; text-align:center;">דוח ביקורת אימות איכות - אינטל חיפה</h1>
            <h2 style="text-align:center;">${form.title}</h2>
            <p style="text-align:center;">מבקר/ת: ${document.getElementById('insp_name').value} | תאריך: ${new Date().toLocaleDateString()}</p>
            <div style="text-align:center; margin:20px;"><span style="background:#0071c5; color:white; padding:10px 20px; border-radius:8px; font-size:20px;">ציון סופי: ${document.getElementById('g-curr').innerText}</span></div>`;

        form.schema.forEach((sec) => {
            html += `<h3 style="background:#eee; padding:10px; border-radius:5px;">${sec.cat}</h3>
            <table style="width:100%; border-collapse:collapse; margin-bottom:20px;">
                <thead><tr style="background:#f4f4f4;"><th style="border:1px solid #ddd; padding:8px; text-align:right;">הנושא הנבדק</th><th style="border:1px solid #ddd; padding:8px; width:100px;">סטטוס</th><th style="border:1px solid #ddd; padding:8px; text-align:right;">הערה</th></tr></thead><tbody>`;
            sec.qs.forEach((q, qIdx) => {
                const qId = `q_${form.schema.indexOf(sec)}_${qIdx}`;
                const s = userScores[qId];
                let stTxt = s === 1 ? "תקין" : (s === 0 ? "ליקוי" : "N/A");
                html += `<tr><td style="border:1px solid #ddd; padding:8px;">${q}</td><td style="border:1px solid #ddd; padding:8px; text-align:center;">${stTxt}</td><td style="border:1px solid #ddd; padding:8px;">${document.getElementById('note_'+qId)?.value || "-"}</td></tr>`;
            });
            html += `</tbody></table>`;
        });
        if(document.getElementById('gen_note').value) html += `<div style="padding:15px; background:#fff3cd; border:1px solid #ffeeba;"><strong>הערות לסיכום:</strong><br>${document.getElementById('gen_note').value}</div>`;
        html += `</div>`;
        document.getElementById('print-area').innerHTML = html;
    }

    function showSummary() {
        buildPDF();
        document.getElementById('modal').style.display = 'block';
    }

    function generatePDF() {
        const el = document.getElementById('print-area');
        el.style.display = 'block';
        
        const opt = {
            margin: 10,
            filename: 'audit_report.pdf',
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { 
                scale: 2, 
                useCORS: true, 
                width: 800, // רוחב קבוע לצילום
                windowWidth: 800 // מכריח את הדפדפן להבין שהדף רחב
            },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        html2pdf().set(opt).from(el).output('blob').then(blob => {
            el.style.display = 'none';
            const file = new File([blob], "Report.pdf", { type: "application/pdf" });
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                navigator.share({ files: [file], title: 'דוח ביקורת איכות' });
            } else {
                const url = URL.createObjectURL(blob);
                window.open(url);
            }
        });
    }
</script>
</body>
</html>
