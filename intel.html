<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="robots" content="noindex, nofollow">
    <title>Intel Haifa QC - System</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root { 
            --p: #0071c5; --d: #003c71; --l: #f0f7ff;
            --g: #27ae60; --y: #f39c12; --r: #e74c3c; 
            --na: #95a5a6; --bg: #f4f7f9; --text: #2c3e50;
        }

        * { box-sizing: border-box; }

        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            background: var(--bg); margin: 0; padding: 0; color: var(--text);
            direction: rtl; overflow-x: hidden;
            -webkit-text-size-adjust: 100%;
        }

        .page { display: none; min-height: 100vh; animation: fadeIn 0.4s ease; }
        .active-page { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* מסך כניסה */
        #login_page { background: radial-gradient(circle at center, var(--p) 0%, var(--d) 100%); display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { background: white; padding: 40px 25px; border-radius: 25px; box-shadow: 0 30px 60px rgba(0,0,0,0.4); width: 100%; max-width: 400px; text-align: center; }

        /* שעונים */
        .dashboard { position: sticky; top: 0; z-index: 2000; background: rgba(255,255,255,0.95); padding: 12px 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.08); display: flex; justify-content: space-around; align-items: center; border-bottom: 4px solid var(--p); backdrop-filter: blur(10px); }
        .gauge-circle { width: 65px; height: 65px; border-radius: 50%; border: 5px solid #f0f2f5; margin: auto; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 900; background: white; transition: 0.5s; }
        
        .container { padding: 15px; max-width: 800px; margin: auto; padding-bottom: 100px; width: 100%; }
        .card { background: white; padding: 20px; border-radius: 20px; margin-bottom: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.06); width: 100%; }
        
        .form-main-title { color: var(--d); font-size: 24px; font-weight: 900; border-bottom: 3px solid var(--p); padding-bottom: 10px; margin-bottom: 25px; line-height: 1.3; }
        .cat-header { background: linear-gradient(135deg, var(--p) 0%, var(--d) 100%); color: white; padding: 15px 20px; border-radius: 12px; font-weight: 800; font-size: 17px; margin: 35px 0 20px; }
        
        .audit-item { background: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 2px solid #edf2f7; box-shadow: 0 3px 6px rgba(0,0,0,0.02); transition: 0.3s; width: 100%; }
        .audit-item.active { border-color: var(--p); }
        
        /* 4 אפשרויות ציון */
        .score-group { display: flex; gap: 5px; margin-top: 15px; flex-wrap: wrap; }
        .btn-score { flex: 1; min-width: 60px; padding: 12px 2px; border: 2px solid #f1f3f5; background: #f8fafc; border-radius: 8px; font-weight: 800; font-size: 14px; cursor: pointer; transition: 0.2s; -webkit-tap-highlight-color: transparent; }
        .btn-100.active { background: var(--g); color: white; border-color: var(--g); }
        .btn-50.active { background: var(--y); color: white; border-color: var(--y); }
        .btn-0.active { background: var(--r); color: white; border-color: var(--r); }
        .btn-na.active { background: var(--na); color: white; border-color: var(--na); }

        /* הערות ותמונות לכל שאלה */
        .note-area { width: 100%; margin-top: 12px; padding: 12px; border: 2px dashed #cbd5e0; border-radius: 10px; font-size: 14px; outline: none; background: #fdfdfd; display:block; }
        .photo-btn { background: #f1f3f5; border: 2px dashed #ccc; padding: 10px; border-radius: 10px; margin-top: 10px; text-align: center; cursor: pointer; font-weight: bold; color: var(--d); font-size: 13px; }
        .photo-preview { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
        .photo-preview img { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; border: 1px solid #ddd; }

        .btn-main { width: 100%; padding: 18px; border: none; border-radius: 12px; font-size: 18px; font-weight: 800; cursor: pointer; transition: 0.3s; background: var(--p); color: white; display: flex; align-items: center; justify-content: center; gap: 10px; }

        input, select, textarea { font-family: inherit; }

        /* PDF Render Zone - iOS Safe */
        #pdf_zone { position: absolute; left: -10000px; top: 0; width: 800px; background: white; padding: 40px; direction: rtl; color: #000; font-family: Arial, sans-serif; }
        .pdf-table { width: 100%; border-collapse: collapse; margin-top: 20px; table-layout: fixed; }
        .pdf-table th, .pdf-table td { border: 1px solid #000; padding: 10px; text-align: right; font-size: 13px; word-wrap: break-word; vertical-align: top; }
        .pdf-table th { background: #f2f2f2; font-weight: bold; }
        .pdf-cat { background: #d9e1f2; font-weight: bold; font-size: 15px; }
        .pdf-img { width: 80px; height: 80px; object-fit: cover; margin: 2px; border: 1px solid #ccc; border-radius: 4px; }
    </style>
</head>
<body>

<div id="login_page" class="page active-page">
    <div class="login-card">
        <h1 style="color:var(--p); margin:0; font-size: 28px;">Intel QC</h1>
        <p style="font-size: 14px; color: #666;">מערכת איכות ופגי תוקף</p>
        
        <input type="tel" id="pass_input" inputmode="numeric" pattern="[0-9]*" onkeyup="if(event.key === 'Enter' || event.keyCode === 13) checkLogin()" style="width:100%; padding:15px; border-radius:12px; border:2px solid #ddd; text-align:center; font-size:24px; font-weight:bold; letter-spacing:3px; margin-top: 20px;" placeholder="קוד גישה (2024)">
        
        <button class="btn-main" style="margin-top:20px;" onclick="checkLogin()">כניסה</button>
    </div>
</div>

<div id="menu_page" class="page">
    <div class="container" style="text-align:center; padding-top:20px;">
        <h2 style="font-size:32px; color:var(--p);">שלום,</h2>
        <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin:25px auto;">
            <div class="card" style="padding:15px 5px;"><span id="st_count" style="font-size:24px; font-weight:900; color:var(--p);">0</span><br><small>ביקורות</small></div>
            <div class="card" style="padding:15px 5px;"><span id="st_avg" style="font-size:24px; font-weight:900; color:var(--p);">0%</span><br><small>ממוצע</small></div>
            <div class="card" style="padding:15px 5px;"><span id="st_last" style="font-size:22px; font-weight:900; color:var(--p);">--</span><br><small>אחרונה</small></div>
        </div>
        <div style="display:grid; gap:15px; margin:30px auto;">
            <button class="btn-main" onclick="showPage('audit_page')">➕ התחל ביקורת</button>
            <button class="btn-main" style="background:white; color:var(--p); border:3px solid var(--p);" onclick="openHistory()">📂 היסטוריה</button>
        </div>
    </div>
</div>

<div id="audit_page" class="page">
    <div class="dashboard">
        <div style="text-align:center; flex:1;">
            <div style="font-size:11px; font-weight:800; color:#7f8c8d;">ציון נוכחי</div>
            <div id="g_live" class="gauge-circle" style="color:var(--p);">0%</div>
        </div>
        <div style="text-align:center; flex:1; position:relative;">
            <div id="trend_icon" style="position:absolute; top:-5px; right:15%; font-size:20px;"></div>
            <div style="font-size:11px; font-weight:800; color:#7f8c8d;">ביקורת קודמת</div>
            <div id="g_prev" class="gauge-circle" style="font-size:14px; color:#bdc3c7; border-style:dashed;">--</div>
        </div>
        <button onclick="showPage('menu_page')" style="background:none; border:none; font-size:28px; cursor:pointer; color:var(--p);">🏠</button>
    </div>

    <div class="container">
        <div class="card">
            <label style="font-weight:800; color:var(--p); font-size:15px;">שם המבקר:</label>
            <input type="text" id="inspector_name" style="width:100%; margin-top:8px; padding:12px; border-radius:10px; border:2px solid #eee; font-size:16px;" placeholder="שם מלא">
            
            <label style="font-weight:800; color:var(--p); display:block; margin-top:20px; font-size:15px;">בחר טופס:</label>
            <select id="form_select" onchange="initForm()" style="width:100%; margin-top:8px; border:3px solid var(--p); font-weight:900; padding:12px; border-radius:10px; font-size:16px;">
                <option value="">-- בחר טופס --</option>
                <optgroup label="Nona">
                    <option value="nona_clean">סיור ניקיון - Nona</option>
                    <option value="nona_food">בטיחות מזון - Nona</option>
                    <option value="nona_expiry">פגי תוקף - Nona</option>
                </optgroup>
                <optgroup label="Bento">
                    <option value="bento_clean">סיור ניקיון - Bento</option>
                    <option value="bento_food">בטיחות מזון - Bento</option>
                    <option value="bento_expiry">פגי תוקף - Bento</option>
                </optgroup>
                <optgroup label="Nine Dine">
                    <option value="nd_clean">סיור ניקיון - Nine Dine</option>
                    <option value="nd_food">בטיחות מזון - Nine Dine</option>
                    <option value="nd_expiry">פגי תוקף - Nine Dine</option>
                </optgroup>
                <optgroup label="אחר">
                    <option value="marlog_expiry">מרלו"ג - ניקיון ותוקף</option>
                    <option value="cafe_clean">בתי קפה - ניקיון</option>
                </optgroup>
            </select>
        </div>

        <div id="questions_mount"></div>

        <div id="audit_footer" class="card" style="display:none; margin-top:30px;">
            <label style="font-weight:800; color:var(--p);">הערות לסיכום דוח:</label>
            <textarea id="audit_summary" rows="4" style="width:100%; margin-top:10px; border:2px solid #eee; border-radius:10px; padding:12px;" placeholder="סיכום כללי..."></textarea>
            <button class="btn-main" style="margin-top:20px;" onclick="saveAudit()">💾 סיים ושמור PDF</button>
        </div>
    </div>
</div>

<div id="history_page" class="page">
    <div class="container">
        <button class="btn-main" style="width:auto; padding:10px 20px; margin-bottom:20px; background:var(--d); font-size:15px;" onclick="showPage('menu_page')">חזור</button>
        <h2 style="color:var(--p); font-size:26px; margin-top:0;">היסטוריית דוחות</h2>
        <div id="history_list"></div>
    </div>
</div>

<div id="modal_pdf" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:5000; padding:20px; backdrop-filter:blur(8px); display:flex; align-items:center; justify-content:center;">
    <div style="background:white; padding:40px 25px; border-radius:25px; width:100%; max-width:400px; text-align:center;">
        <h2 style="color:var(--p); margin-top:0;">הדוח מוכן וכולל את כל התמונות וההערות!</h2>
        <button class="btn-main" onclick="exportPDF()">📤 שלח PDF עכשיו</button>
        <button class="btn-main" style="background:#f1f3f5; color:#444; margin-top:12px; border:2px solid #ddd;" onclick="document.getElementById('modal_pdf').style.display='none'">חזור</button>
    </div>
</div>

<div id="pdf_zone"></div>

<script>
    const DB = {
        "nona_clean": {
            name: "סיור ניקיון - Nona",
            sections: [
                { t: "רחבת כניסה חדר אוכל", qs: ["האם איזור הקופות נקי", "האם עמדת הצטיידות (סכום ומגשים) נקיה ומסודרת", "האם איזור כניסה לחדר אוכל נקי"] },
                { t: "עמדות הגשה", qs: ["האם פלנצ'ות נקיות ומוכנות לעבודה", "האם המנדפים נקיים", "האם דלפקי הגשה ומשטחי עבודה נקיים", "האם הריצפה והתעלות ריקות משאריות מזון"] }
            ]
        },
        "bento_clean": {
            name: "סיור ניקיון - Bento",
            sections: [
                { t: "רחבת כניסה", qs: ["האם איזור הקופות נקי", "האם עמדת הצטיידות (סכום ומגשים) נקיה ומסודרת"] },
                { t: "עמדות הגשה", qs: ["האם פלנצ'ות נקיות ומוכנות לעבודה", "האם מקררים בדלפקי הגשה ריקים ונקיים"] }
            ]
        },
        "nd_clean": {
            name: "סיור ניקיון - Nine Dine",
            sections: [
                { t: "רחבת כניסה", qs: ["האם איזור הקופות נקי", "האם עמדת הצטיידות נקיה ומסודרת", "האם עמדת שטיפת ידיים נקייה"] },
                { t: "עמדות הגשה", qs: ["האם פלנצ'ות נקיות ומוכנות לעבודה", "האם המנדפים נקיים", "האם פסים קרים וחמים נקיים"] }
            ]
        },
        "nona_food": { name: "בטיחות מזון - Nona", sections: [ { t: "מערכות קירור", qs: ["שימוש במקררים לפי הייעוד שלו ?", "האם כל המזון מכוסה / עטוף?", "האם נצפו מזון ללא מדבקת תאריך פתיחה?"] } ] },
        "bento_food": { name: "בטיחות מזון - Bento", sections: [ { t: "עמדות הגשה", qs: ["האם מתקיימת עבודה עפ קוד צבעים?", "האם הטמפ' של המזון בהגשה תקינה?", "האם נשמרות דוגמאות מזון?"] } ] },
        "nd_food": { name: "בטיחות מזון - Nine Dine", sections: [ { t: "עמדות הגשה", qs: ["האם מתקיימת עבודה עפ קוד צבעים?", "האם הטמפ' של המזון בהגשה תקינה?"] } ] },
        "nona_expiry": { name: "פגי תוקף - Nona", sections: [ { t: "מקררים", qs: ["האם נמצאו פגי תוקף ?", "האם נמצא מוצר עם תוקף קצר?"] } ] },
        "bento_expiry": { name: "פגי תוקף - Bento", sections: [ { t: "מקררים", qs: ["האם נמצאו פגי תוקף ?", "האם נמצא מוצר עם תוקף קצר?"] } ] },
        "nd_expiry": { name: "פגי תוקף - Nine Dine", sections: [ { t: "מקררים", qs: ["האם נמצאו פגי תוקף ?", "האם נמצא מוצר עם תוקף קצר?"] } ] },
        "marlog_expiry": { name: "פגי תוקף וניקיון מרלוג", sections: [ { t: "מקרר 15", qs: ["האם המקרר נקי?", "האם נמצאו פגי תוקף ?"] } ] },
        "cafe_clean": { name: "סיור ניקיון בתי קפה", sections: [ { t: "עמדת הגשה", qs: ["האם עמדת ההגשה נקייה", "האם הקופה נקייה ונעולה"] } ] }
    };

    let session = { scores: {}, notes: {}, photos: {}, type: "", inspector: "", score: 0, date: null, prevScore: null, avgScore: null };

    // התיקון לכניסה: שימוש ב-Trim ומקלדת טלפון
    function checkLogin() {
        const pass = document.getElementById('pass_input').value.trim();
        if(pass === "2024") showPage('menu_page');
        else alert("קוד שגוי, אנא נסה שוב");
    }

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.getElementById(id).classList.add('active-page');
        window.scrollTo(0,0);
        if(id === 'menu_page') refreshStats();
    }

    function initForm() {
        const type = document.getElementById('form_select').value;
        const mount = document.getElementById('questions_mount');
        if(!type) { mount.innerHTML = ""; return; }
        
        const config = DB[type];
        session = { scores: {}, notes: {}, photos: {}, type: type, inspector: "", score: 0, date: Date.now() };
        
        const history = JSON.parse(localStorage.getItem('qc_intel_final_v5') || '[]');
        const typeHistory = history.filter(h => h.type === type);
        
        if(typeHistory.length > 0) { 
            session.prevScore = typeHistory[0].score;
            session.avgScore = Math.round(typeHistory.reduce((a,b)=>a+b.score, 0) / typeHistory.length);
        } else { 
            session.prevScore = null; 
            session.avgScore = null;
        }
        
        const prevG = document.getElementById('g_prev');
        const trend = document.getElementById('trend_icon');
        prevG.innerText = session.prevScore !== null ? session.prevScore + "%" : "--";
        trend.innerHTML = "";

        let html = `<div class="form-main-title">${config.name}</div>`;
        
        config.sections.forEach((sec, sIdx) => {
            html += `<div class="cat-header"><span>${sec.t}</span></div>`;
            
            sec.qs.forEach((q, qIdx) => {
                const qId = `q_${sIdx}_${qIdx}`;
                html += `
                <div class="audit-item" id="row_${qId}">
                    <div style="font-size:16px; font-weight:700; margin-bottom:10px;">${q}</div>
                    
                    <div class="score-group">
                        <button class="btn-score btn-100" onclick="setScore('${qId}', 100, this)">תקין</button>
                        <button class="btn-score btn-50" onclick="setScore('${qId}', 50, this)">חלקי</button>
                        <button class="btn-score btn-0" onclick="setScore('${qId}', 0, this)">לא תקין</button>
                        <button class="btn-score btn-na" onclick="setScore('${qId}', -1, this)">ל"ר</button>
                    </div>
                    
                    <textarea class="note-area" id="note_${qId}" oninput="session.notes['${qId}']=this.value" placeholder="הוסף הערה לשאלה זו..."></textarea>
                    
                    <div class="photo-btn" onclick="document.getElementById('cam_${qId}').click()">
                        📸 צרף תמונה לשאלה זו
                        <input type="file" id="cam_${qId}" accept="image/*" multiple style="display:none" onchange="handleQPhotos('${qId}', this)">
                    </div>
                    <div id="prev_${qId}" class="photo-preview"></div>

                </div>`;
            });
        });

        mount.innerHTML = html;
        document.getElementById('audit_footer').style.display = 'block';
        updateUI();
    }

    function handleQPhotos(qId, input) {
        const files = input.files;
        if(!session.photos[qId]) session.photos[qId] = [];
        const prev = document.getElementById(`prev_${qId}`);
        
        Array.from(files).forEach(file => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = document.createElement('img');
                img.src = e.target.result;
                prev.appendChild(img);
                session.photos[qId].push(e.target.result);
            };
            reader.readAsDataURL(file);
        });
    }

    function setScore(id, val, btn) {
        session.scores[id] = val;
        btn.parentElement.querySelectorAll('.btn-score').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        updateUI();
    }

    function updateUI() {
        let sum = 0, count = 0;
        for(let k in session.scores) { 
            if(session.scores[k] !== -1) { 
                sum += session.scores[k]; 
                count++; 
            } 
        }
        const score = count > 0 ? Math.round(sum / count) : 0;
        session.score = score;
        
        const g = document.getElementById('g_live');
        const trend = document.getElementById('trend_icon');
        g.innerText = score + "%";
        
        if(score >= 85) g.style.borderColor = "var(--g)";
        else if(score >= 70) g.style.borderColor = "var(--y)";
        else g.style.borderColor = "var(--r)";

        if(session.prevScore !== null) {
            if(score > session.prevScore) { trend.innerHTML = "🔼"; trend.style.color = "var(--g)"; }
            else if(score < session.prevScore) { trend.innerHTML = "🔽"; trend.style.color = "var(--r)"; }
            else { trend.innerHTML = "⏺"; trend.style.color = "#999"; }
        }
    }

    function refreshStats() {
        const history = JSON.parse(localStorage.getItem('qc_intel_final_v5') || '[]');
        document.getElementById('st_count').innerText = history.length;
        if(history.length > 0) {
            const avg = Math.round(history.reduce((a,b) => a + b.score, 0) / history.length);
            document.getElementById('st_avg').innerText = avg + "%";
            document.getElementById('st_last').innerText = new Date(history[0].date).toLocaleDateString('he-IL');
        }
    }

    function openHistory() {
        const history = JSON.parse(localStorage.getItem('qc_intel_final_v5') || '[]');
        const list = document.getElementById('history_list');
        if(history.length === 0) list.innerHTML = "<p>אין דוחות שמורים.</p>";
        else {
            list.innerHTML = history.map(h => `
                <div class="card" style="display:flex; justify-content:space-between; align-items:center; border-right:4px solid var(--p); padding:15px;">
                    <div><h4 style="margin:0 0 5px 0; font-size:16px;">${DB[h.type].name}</h4><p style="margin:0; font-size:12px; color:#666;">${new Date(h.date).toLocaleDateString('he-IL')} | ${h.inspector}</p></div>
                    <div style="font-size:22px; font-weight:bold; color:var(--p);">${h.score}%</div>
                </div>
            `).join('');
        }
        showPage('history_page');
    }

    function saveAudit() {
        session.inspector = document.getElementById('inspector_name').value || "לא צוין";
        if(session.inspector === "לא צוין") { alert("הכנס שם מבקר"); return; }
        
        let history = JSON.parse(localStorage.getItem('qc_intel_final_v5') || '[]');
        history.unshift(session);
        localStorage.setItem('qc_intel_final_v5', JSON.stringify(history));
        
        document.getElementById('modal_pdf').style.display = 'flex';
    }

    function exportPDF() {
        const config = DB[session.type];
        const zone = document.getElementById('pdf_zone');
        
        const now = new Date(session.date);
        const dateStr = now.toLocaleDateString('he-IL');
        const timeStr = now.toTimeString().substring(0, 5);
        const passFailStr = session.score >= 85 ? "(עובר)" : "(נכשל)";
        
        const prevScoreStr = session.prevScore !== null ? `${session.prevScore}%` : "אין נתונים";
        const avgScoreStr = session.avgScore !== null ? `${session.avgScore}%` : "אין נתונים";

        let html = `
            <div style="text-align: right; margin-bottom: 25px;">
                <h1 style="margin:0; font-size:28px; color: #003c71;">סיכום ביקורת איכות - אינטל חיפה</h1>
                <h2 style="margin:8px 0 15px 0; font-size:20px; color: #0071c5;">${config.name}</h2>
                <div style="font-size:16px; line-height:1.5; background: #f8f9fa; padding: 15px; border: 1px solid #ddd; border-radius: 8px;">
                    <strong>תאריך:</strong> ${dateStr} | <strong>שעות:</strong> ${timeStr}<br>
                    <strong>מבקר:</strong> ${session.inspector}<br>
                    <strong>ציון נוכחי:</strong> <span style="font-size:18px; font-weight:bold; color: #000;">${session.score}% ${passFailStr}</span><br>
                    <strong>ציון ביקורת קודמת במתחם:</strong> ${prevScoreStr}<br>
                    <strong>ציון ממוצע מצטבר במתחם:</strong> ${avgScoreStr}
                </div>
            </div>
            
            <table class="pdf-table">
                <thead>
                    <tr>
                        <th style="width: 35%;">הסעיף הנבדק</th>
                        <th style="width: 15%; text-align: center;">סטטוס</th>
                        <th style="width: 25%;">הערת מבקר</th>
                        <th style="width: 25%; text-align: center;">תמונות</th>
                    </tr>
                </thead>
                <tbody>`;
        
        config.sections.forEach((sec, sIdx) => {
            html += `<tr class="pdf-cat"><td colspan="4">${sec.t}</td></tr>`;
            
            sec.qs.forEach((q, qIdx) => {
                const id = `q_${sIdx}_${qIdx}`;
                const val = session.scores[id];
                const note = session.notes[id] || "";
                
                let stTxt = "לא נבדק";
                if(val === 100) stTxt = "100% (תקין)";
                else if(val === 50) stTxt = "50% (חלקי)";
                else if(val === 0) stTxt = "0% (לא תקין)";
                else if(val === -1) stTxt = "N/A";

                let imgCell = "";
                if(session.photos[id] && session.photos[id].length > 0) {
                    imgCell = session.photos[id].map(src => `<img src="${src}" class="pdf-img">`).join(' ');
                }

                html += `
                    <tr>
                        <td style="font-weight:bold;">${q}</td>
                        <td style="text-align:center;">${stTxt}</td>
                        <td style="white-space:pre-wrap;">${note}</td>
                        <td style="text-align:center;">${imgCell}</td>
                    </tr>`;
            });
        });

        html += `</tbody></table>`;
        
        const sumText = document.getElementById('audit_summary').value;
        if(sumText) {
            html += `<div style="margin-top:30px; border: 2px solid #0071c5; padding: 15px; border-radius: 8px;">
                <h3 style="margin: 0 0 10px 0; color: #0071c5;">הערות לסיכום מנהלים:</h3>
                <p style="white-space:pre-wrap; font-size:15px; margin: 0;">${sumText}</p>
            </div>`;
        }
        
        zone.innerHTML = html;

        const opt = {
            margin: 10,
            filename: `Audit_${session.inspector}_${dateStr.replace(/\//g,'-')}.pdf`,
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 1.5, useCORS: true, width: 800, windowWidth: 800, scrollX: 0, scrollY: 0 },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        html2pdf().set(opt).from(zone).output('blob').then(blob => {
            const file = new File([blob], `Audit.pdf`, { type: 'application/pdf' });
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                navigator.share({ files: [file], title: 'דוח ביקורת מלא' });
            } else {
                window.open(URL.createObjectURL(blob));
            }
            document.getElementById('modal_pdf').style.display = 'none';
        });
    }

    window.onload = refreshStats;
</script>
</body>
</html>
