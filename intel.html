<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>מערכת בקרות חכמה - Intel (Full Edition)</title>
    <style>
        :root { --p: #0071c5; --s: #00aeef; --g: #27ae60; --y: #f39c12; --r: #e74c3c; --na: #95a5a6; --bg: #f4f6f7; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 0; color: #333; }
        .dashboard { position: sticky; top: 0; z-index: 1000; background: white; display: flex; justify-content: space-around; padding: 15px 5px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-bottom: 3px solid var(--p); }
        .gauge-container { text-align: center; width: 45%; }
        .gauge-label { font-size: 13px; font-weight: bold; margin-bottom: 5px; color: #666; }
        .gauge-bg { width: 90px; height: 90px; border-radius: 50%; border: 6px solid #eee; margin: auto; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 900; transition: 0.5s; color: var(--p); }
        .container { padding: 15px; max-width: 600px; margin: auto; }
        .card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 5px; color: var(--p); }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; margin-bottom: 10px; box-sizing: border-box; background: #fff; }
        .cat-title { background: var(--p); color: white; padding: 12px; border-radius: 6px; margin: 25px 0 10px; font-weight: bold; font-size: 16px; text-align: center; }
        .audit-item { background: white; padding: 12px; border-radius: 10px; margin-bottom: 12px; border-right: 5px solid #ddd; }
        .question-text { font-weight: 600; margin-bottom: 10px; font-size: 14px; }
        .score-row { display: flex; gap: 5px; margin-bottom: 8px; }
        .score-btn { flex: 1; padding: 10px 5px; border: 1px solid #ddd; background: #f9f9f9; border-radius: 6px; font-weight: bold; font-size: 13px; cursor: pointer; transition: 0.2s; text-align: center; }
        .btn-pass.active { background: var(--g); color: white; border-color: var(--g); }
        .btn-part.active { background: var(--y); color: white; border-color: var(--y); }
        .btn-fail.active { background: var(--r); color: white; border-color: var(--r); }
        .btn-na.active { background: var(--na); color: white; border-color: var(--na); }
        .extras-row { display: flex; gap: 8px; margin-top: 5px; }
        .note-input { flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; background: #fafafa; }
        .cam-btn { background: #eee; border: 1px solid #ddd; border-radius: 6px; padding: 0 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .thumb-preview { max-width: 80px; max-height: 80px; border-radius: 6px; margin-top: 8px; display: none; border: 1px solid #ccc; }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-primary { background: var(--p); color: white; }
        .btn-wa { background: #25D366; color: white; }
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; overflow-y: auto; padding: 15px; box-sizing: border-box; }
        .modal-body { background: white; padding: 20px; border-radius: 12px; }
    </style>
</head>
<body>

<div id="login" class="container" style="padding: 50px 20px; text-align: center;">
    <h2>🏢 מערכת בקרות חכמה - Intel</h2>
    <p style="color: #666;">גרסה מלאה - כל השורות</p>
    <input type="password" id="pass" placeholder="קוד גישה (2024)" style="margin-top: 20px;">
    <button class="btn btn-primary" onclick="checkPass()">כניסה למערכת</button>
</div>

<div id="app" style="display:none;">
    <div class="dashboard">
        <div class="gauge-container">

        <div class="gauge-container">

        </div>
    </div>

    <div class="container">
        <div class="card">
            <label>בחר גיליון / טופס לביצוע:</label>
            <select id="form_selector" onchange="loadForm()" style="border: 2px solid var(--p); font-weight: bold;">
                <option value="">-- בחר טופס מהרשימה --</option>
                <optgroup label="🧹 סיורי ניקיון">

                    <option value="clean_nona">סיור ניקיון - Nona (IDC7)</option>
                    <option value="clean_cafe">סיור ניקיון - בתי קפה (Ilan's)</option>
                </optgroup>
                <optgroup label="🍔 בטיחות במזון">
                    <option value="food_ninedine">בטיחות מזון - Nine Dine (IDC9)</option>
                    <option value="food_bento">בטיחות מזון - Bento (IDC1)</option>
                    <option value="food_nona">בטיחות מזון - Nona (IDC7)</option>
                    <option value="food_cafe">בטיחות מזון - בתי קפה</option>
                </optgroup>
                <optgroup label="📅 פגי תוקף ו-FIFO">
                    <option value="expiry_ninedine">ביקורת פגי תוקף - Nine Dine</option>
                    <option value="expiry_bento">ביקורת פגי תוקף - Bento</option>
                    <option value="expiry_nona">ביקורת פגי תוקף - Nona</option>
                    <option value="expiry_marlog">ביקורת פגי תוקף וניקיון - מרלו"ג</option>
                </optgroup>
                <optgroup label="⚠️ בטיחות בעבודה">
                    <option value="safety_work">בטיחות בעבודה (אינטל חיפה)</option>
                </optgroup>
            </select>
            
            <div class="grid-2" style="margin-top: 15px;">
                <div><label>שם המבקר:</label><input type="text" id="insp_name" placeholder="השם שלך"></div>
                <div><label>טלפון מנהל (וואטסאפ):</label><input type="tel" id="mgr_phone" placeholder="0501234567"></div>
                <div><label>שעת התחלה:</label><input type="time" id="time_start"></div>
                <div><label>שעת סיום:</label><input type="time" id="time_end"></div>
            </div>
        </div>

        <div id="questions_area">
            <div style="text-align:center; padding: 40px; color: #7f8c8d; border: 2px dashed #ccc; border-radius: 10px;">
                👆 יש לבחור טופס ביקורת מהרשימה למעלה.
            </div>
        </div>

        <div class="card" id="summary_card" style="display:none;">
            <label>הערות כלליות לסיכום מנהלים:</label>
            <textarea id="gen_note" rows="3" placeholder="סיכום כללי על המשמרת..."></textarea>
            <button class="btn btn-primary" onclick="showSummary()">הצג סיכום ושליחה בוואטסאפ</button>
        </div>
    </div>
</div>

<div id="modal">
    <div class="modal-body">
        <h2 style="margin-top:0">📋 סיכום דוח</h2>
        <div id="sum-text" style="white-space: pre-wrap; font-size: 14px; background: #f9f9f9; padding: 10px; border-radius: 8px; border: 1px solid #eee;"></div>
        <button class="btn btn-wa" onclick="sendWA()" style="margin-top: 15px;">שלח דוח בוואטסאפ 🟢</button>
        <button class="btn" style="background:#666; color:white;" onclick="closeModal()">חזרה לעריכה</button>
    </div>
</div>

                { cat: "הרמת מכונות ושינוע", qs: ["אין להרים ציוד כבד/סירים ללא עזרה נכונה", "שינוע עגלות - לפי נוהל", "מעבר כלים/ציוד חם במטבח", "הרמת סירים כבדים ללא עזרה"] }
            ]
        }
    };

    let userScores = {};
    let currentFormId = "";

    function checkPass() {
        if(document.getElementById('pass').value === "2024") {
            document.getElementById('login').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            document.getElementById('time_start').value = new Date().toTimeString().slice(0,5);
        } else alert("קוד גישה שגוי. נסה שוב.");
    }

    function loadForm() {
        currentFormId = document.getElementById('form_selector').value;
        const area = document.getElementById('questions_area');
        userScores = {}; 
        document.getElementById('g-curr').innerText = "0%";
        document.getElementById('g-status').innerText = "ממתין";
        document.getElementById('g-curr').style.color = "var(--p)";
        document.getElementById('g-curr').style.borderColor = "var(--p)";
        
        if(!currentFormId || !formsDB[currentFormId]) {
            area.innerHTML = `<div style="text-align:center; padding:40px; color:#7f8c8d; border: 2px dashed #ccc; border-radius: 10px;">👆 יש לבחור טופס ביקורת מהרשימה למעלה.</div>`;
            document.getElementById('summary_card').style.display = 'none';
            return;
        }

        const formData = formsDB[currentFormId];
        let html = "";
        
        formData.schema.forEach((sec, sIdx) => {
            html += `<div class="cat-title">${sec.cat}</div>`;
            sec.qs.forEach((q, qIdx) => {
                const qId = `q_${sIdx}_${qIdx}`;
                html += `
                <div class="audit-item" id="item_${qId}">
                    <div class="question-text">${q}</div>
                    <div class="score-row">
                        <button class="score-btn btn-pass" onclick="setScore('${qId}', 1, this)">✅ תקין</button>
                        <button class="score-btn btn-part" onclick="setScore('${qId}', 0.5, this)">⚠️ חלקי</button>
                        <button class="score-btn btn-fail" onclick="setScore('${qId}', 0, this)">❌ לא תקין</button>
                        <button class="score-btn btn-na" onclick="setScore('${qId}', -1, this)">➖ N/A</button>
                    </div>
                    <div class="extras-row">
                        <input type="text" class="note-input" id="note_${qId}" placeholder="הערת מבקר...">
                        <label class="cam-btn" title="צלם תמונה">📷<input type="file" id="img_${qId}" accept="image/*" capture="environment" style="display:none" onchange="previewImg(this, '${qId}')"></label>
                    </div>
                    <img id="thumb_${qId}" class="thumb-preview" src="" alt="תצוגה מקדימה">
                </div>`;
            });
        });

        area.innerHTML = html;
        document.getElementById('summary_card').style.display = 'block';
    }

    function previewImg(input, qId) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = document.getElementById(`thumb_${qId}`);
                img.src = e.target.result;
                img.style.display = 'block';
            }
            reader.readAsDataURL(input.files[0]);
        }
    }

    function setScore(qId, val, btnEl) {
        userScores[qId] = val;
        const row = btnEl.parentElement;
        row.querySelectorAll('.score-btn').forEach(b => b.classList.remove('active'));
        btnEl.classList.add('active');
        
        const item = document.getElementById(`item_${qId}`);
        if(val === 1) item.style.borderRightColor = "var(--g)";
        else if(val === 0.5) item.style.borderRightColor = "var(--y)";
        else if(val === 0) item.style.borderRightColor = "var(--r)";
        else item.style.borderRightColor = "var(--na)";
        calcScore();
    }

    function calcScore() {
        let totalQs = 0, earned = 0;
        for (const key in userScores) {
            if(userScores[key] !== -1) { totalQs++; earned += userScores[key]; }
        }
        const gauge = document.getElementById('g-curr');
        const status = document.getElementById('g-status');
        if(totalQs === 0) { gauge.innerText = "0%"; return; }

        const pct = Math.round((earned / totalQs) * 100);
        gauge.innerText = `${pct}%`;
        
        if (pct >= 85) { gauge.style.borderColor = "var(--g)"; gauge.style.color = "var(--g)"; status.innerText = "עובר ✅"; status.style.color = "var(--g)"; }
        else if(pct >= 70) { gauge.style.borderColor = "var(--y)"; gauge.style.color = "var(--y)"; status.innerText = "טעון שיפור ⚠️"; status.style.color = "var(--y)"; }
        else { gauge.style.borderColor = "var(--r)"; gauge.style.color = "var(--r)"; status.innerText = "נכשל ❌"; status.style.color = "var(--r)"; }
    }

    function showSummary() {
        if(!currentFormId) return alert("אנא בחר טופס!");
        const formTitle = formsDB[currentFormId].title;
        const pct = document.getElementById('g-curr').innerText;

        const now = new Date();
        if(!document.getElementById('time_end').value) document.getElementById('time_end').value = now.toTimeString().slice(0,5);

        let report = `*דוח ${formTitle}*\n`;
        report += `מבקר: ${document.getElementById('insp_name').value || "לא צוין"}\n`;
        report += `תאריך: ${now.toLocaleDateString()} | שעות: ${document.getElementById('time_start').value}-${document.getElementById('time_end').value}\n`;
        report += `------------------------\n`;
        report += `*ציון ביקורת: ${pct}* (${document.getElementById('g-status').innerText})\n`;
        report += `------------------------\n\n`;
        
        let details = "";
        formsDB[currentFormId].schema.forEach((sec, sIdx) => {
            sec.qs.forEach((q, qIdx) => {
                const qId = `q_${sIdx}_${qIdx}`;
                const score = userScores[qId];
                const note = document.getElementById(`note_${qId}`).value;
                const hasImg = document.getElementById(`img_${qId}`).files.length > 0;
                
                if(score === 0 || score === 0.5 || note || hasImg) {
                    let mark = "❓";
                    if(score === 1) mark = "✅ תקין:";
                    if(score === 0.5) mark = "⚠️ חלקי:";
                    if(score === 0) mark = "❌ לא תקין:";
                    if(score === -1) mark = "➖ N/A:";
                    
                    details += `${mark} ${q}\n`;
                    if(note) details += `   📝 ${note}\n`;
                    if(hasImg) details += `   📷 [צורפה תמונה - יש לשלוח ידנית]\n`;
                    details += `\n`;
                }
            });
        });

        if(details !== "") report += `*פירוט ממצאים/הערות:*\n${details}`;
        else report += `*הכל נמצא תקין! אין ממצאים חריגים בדוח זה.* 🎉\n\n`;

        report += `*סיכום מנהלים:* ${document.getElementById('gen_note').value || "אין"}`;
        
        document.getElementById('sum-text').innerText = report;
        document.getElementById('modal').style.display = 'block';
    }

    function sendWA() {
        const phone = document.getElementById('mgr_phone').value;
        if(!phone) return alert("אנא הזן טלפון לשליחה");
        const text = encodeURIComponent(document.getElementById('sum-text').innerText);
        window.open(`https://wa.me/972${phone.startsWith('0') ? phone.substring(1) : phone}?text=${text}`);
        closeModal();
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }
</script>
</body>
</html>
